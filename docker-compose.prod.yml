# Production stack.
# Requires a .env file in this directory. Copy .env.example to .env and update the values first.
services:
  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: clawops-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    logging: &json_log
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"

  # ── Frontend (Next.js) ──
  frontend:
    image: teslicvukasin/claw-ops-fe:latest
    container_name: clawops-fe
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging: *json_log

  # ── Backend (Spring Boot) ──
  backend:
    image: teslicvukasin/claw-ops:latest
    container_name: claw-ops
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      SPRING_PROFILES_ACTIVE: prod
      SWAGGER_ENABLED: "${SWAGGER_ENABLED:-false}"
      SSH_STRICT_HOST_KEY_CHECKING: "${SSH_STRICT_HOST_KEY_CHECKING:-true}"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      # Read-only socket — used only for log streaming + health probes.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      # Host-side docker GID so the non-root appuser can read the socket.
      # Compute via: getent group docker | cut -d: -f3
      - "${HOST_DOCKER_GID:-988}"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *json_log

  # ── Database ──
  postgres:
    image: postgres:17-alpine
    container_name: claw-ops-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-openclaw}
      POSTGRES_USER: ${DB_USERNAME:-openclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - claw_ops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-openclaw} -d ${DB_NAME:-openclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging: *json_log

volumes:
  claw_ops_pgdata:
