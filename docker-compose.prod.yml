services:
  app:
    image: teslicvukasin/claw-ops:latest
    container_name: claw-ops
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      SPRING_PROFILES_ACTIVE: prod
      SWAGGER_ENABLED: "false"
      SSH_STRICT_HOST_KEY_CHECKING: "true"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: claw-ops-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-openclaw}
      POSTGRES_USER: ${DB_USERNAME:-openclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - claw_ops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-openclaw} -d ${DB_NAME:-openclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  claw_ops_pgdata:
