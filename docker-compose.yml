# Development helper only.
# Starts PostgreSQL for running the Spring Boot app locally from source.
# For the full production stack, use docker-compose.prod.yml with a real .env file.
services:
  postgres:
    image: postgres:17-alpine
    container_name: openclaw-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-openclaw}
      POSTGRES_USER: ${DB_USERNAME:-openclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - openclaw_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-openclaw} -d ${DB_NAME:-openclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  openclaw_pgdata:
