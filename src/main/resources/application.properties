spring.application.name=openclaw-servers-manager
server.port=${SERVER_PORT:8080}

# ── Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:openclaw}
spring.datasource.username=${DB_USERNAME:openclaw}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ── Flyway ───────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ── OpenAPI / Swagger UI ─────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# ── SSH ──────────────────────────────────────────────────
ssh.connection-timeout=10000
ssh.command-timeout=60
ssh.strict-host-key-checking=${SSH_STRICT_HOST_KEY_CHECKING:true}
ssh.max-output-size=1048576

# ── Terminal ──────────────────────────────────────────────
terminal.session-timeout-minutes=${TERMINAL_SESSION_TIMEOUT:30}
terminal.max-sessions-per-user=${TERMINAL_MAX_SESSIONS:5}
terminal.token-expiry-seconds=${TERMINAL_TOKEN_EXPIRY:60}

# ── Login Security (rate limiting & account lockout) ──────
login.security.rate-limit-max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:10}
login.security.rate-limit-window-seconds=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
login.security.lockout-threshold=${ACCOUNT_LOCKOUT_THRESHOLD:5}
login.security.lockout-duration-minutes=${ACCOUNT_LOCKOUT_DURATION_MINUTES:15}

# ── CORS ──────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PATCH,DELETE,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With,Accept,Origin}
cors.expose-headers=${CORS_EXPOSE_HEADERS:}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:false}
cors.max-age=${CORS_MAX_AGE:3600}

# ── SSL ──────────────────────────────────────────────────
ssl.admin-email=${SSL_ADMIN_EMAIL:admin@openclaw.com}
ssl.target-port=${SSL_TARGET_PORT:3000}
