# Generated from http-only.conf — HTTP-only mode.
# Re-run install.sh after provisioning SSL to switch to the HTTPS variant.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream claw_chat {
    server claw-chat:3100;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name {{HOSTNAME}};

    client_max_body_size 50m;

    location / {
        proxy_pass http://claw_chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for /ws/chat and /ws/terminal.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long-lived streams — bump these so idle WS connections don't drop.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
