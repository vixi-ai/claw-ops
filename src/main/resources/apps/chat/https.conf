# Generated from https.conf — HTTP→HTTPS redirect + TLS termination.
# Cert paths match the compose mount: /etc/nginx/certs ←→ /etc/letsencrypt/live/{{HOSTNAME}}
# Re-run install.sh after cert renewal if the files have moved.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream claw_chat {
    server claw-chat:3100;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name {{HOSTNAME}};
    return 301 https://$host$request_uri;
}

# ── HTTPS ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name {{HOSTNAME}};

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 50m;

    location / {
        proxy_pass http://claw_chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for /ws/chat and /ws/terminal.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long-lived streams — bump these so idle WS connections don't drop.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
