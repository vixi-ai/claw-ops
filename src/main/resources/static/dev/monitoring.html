<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring - OpenClaw Control Plane</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* Health badges */
        .health-badge { display:inline-block; padding:3px 10px; border-radius:8px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.3px; }
        .health-HEALTHY { background:#d1fae5; color:#065f46; }
        .health-WARNING { background:#fef3c7; color:#92400e; }
        .health-CRITICAL { background:#fee2e2; color:#991b1b; }
        .health-UNREACHABLE { background:#e5e7eb; color:#4b5563; }
        .health-UNKNOWN { background:#e5e7eb; color:#6b7280; }
        .health-MAINTENANCE { background:#dbeafe; color:#1e40af; }

        /* Summary cards */
        .summary-row { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
        .summary-card { flex:1; min-width:100px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; text-align:center; }
        .summary-card .num { font-size:28px; font-weight:700; line-height:1.1; }
        .summary-card .lbl { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-top:4px; }
        .summary-card.green .num { color:var(--success); }
        .summary-card.yellow .num { color:var(--warning); }
        .summary-card.red .num { color:var(--danger); }
        .summary-card.gray .num { color:var(--text-muted); }
        .summary-card.blue .num { color:#6c8aff; }

        /* Metric bars */
        .metric-bar { display:flex; align-items:center; gap:8px; }
        .metric-bar-track { flex:1; height:6px; background:var(--surface-hover); border-radius:3px; overflow:hidden; max-width:80px; }
        .metric-bar-fill { height:100%; border-radius:3px; transition:width .3s; }
        .metric-bar-fill.green { background:var(--success); }
        .metric-bar-fill.yellow { background:var(--warning); }
        .metric-bar-fill.red { background:var(--danger); }

        /* Filters */
        .filter-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .filter-row select { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:var(--radius); font-size:12px; font-family:var(--font); }

        /* Detail panel */
        .detail-row { display:none; }
        .detail-row.show { display:table-row; }
        .detail-panel { padding:16px 24px; background:var(--surface-hover); }
        .detail-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:12px; }
        .detail-metric { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px; }
        .detail-metric .val { font-size:20px; font-weight:700; }
        .detail-metric .label { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--text-muted); margin-top:2px; }

        /* Chart area */
        .chart-area { margin-top:16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
        .chart-area canvas { width:100%; height:180px; }
        .chart-controls { display:flex; gap:6px; margin-bottom:10px; }
        .chart-controls button { background:transparent; border:1px solid var(--border); color:var(--text-muted); padding:4px 10px; border-radius:var(--radius); font-size:11px; cursor:pointer; font-family:var(--font); }
        .chart-controls button.active { background:var(--text); color:var(--bg); }

        /* Profile modal */
        #profileModal .modal { max-width:440px; padding:0; overflow:hidden; }
        .modal-header { padding:24px 24px 4px; }
        .modal-header h3 { font-size:15px; font-weight:600; margin:0; }
        .modal-header p { font-size:11px; color:var(--text-muted); margin:2px 0 0; }
        .modal-body { max-height:60vh; overflow-y:auto; padding:16px 24px 8px; }
        .modal-footer { display:flex; justify-content:flex-end; align-items:center; gap:8px; padding:16px 24px; border-top:1px solid var(--border); }
        .btn-cancel { background:transparent; border:none; padding:8px 16px; font-size:13px; color:var(--text-muted); cursor:pointer; font-family:var(--font); border-radius:var(--radius); }
        .btn-cancel:hover { color:var(--text); }
        .btn-submit { padding:8px 20px; font-size:13px; font-weight:500; border:1px solid var(--border); border-radius:var(--radius); background:var(--text); color:var(--bg); cursor:pointer; font-family:var(--font); transition:opacity .15s; }
        .btn-submit:hover { opacity:.9; }
        .btn-submit:disabled { opacity:.4; cursor:not-allowed; }
        .field-label { display:block; font-size:11px; font-weight:500; color:var(--text-muted); margin-bottom:5px; }
        .threshold-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }

        /* Section tabs */
        .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:16px; }
        .tab { padding:8px 16px; font-size:12px; font-weight:500; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
        .tab.active { color:var(--text); border-bottom-color:var(--primary); }

        /* Uptime text */
        .text-mono { font-family:var(--mono); font-size:12px; }
        .text-sm { font-size:11px; }
        .cursor-pointer { cursor:pointer; }
        tr.cursor-pointer:hover td { background:var(--surface-hover); }
    </style>
</head>
<body>
    <script src="common.js"></script>
    <script>requireAuth();</script>

    <div id="header"></div>
    <div class="container">
        <div id="alert" class="alert"></div>

        <!-- Summary Cards -->
        <div class="summary-row" id="summaryCards"></div>

        <!-- Filters -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div class="filter-row">
                <select id="filterEnv" onchange="loadHealth()"><option value="">All environments</option></select>
                <select id="filterState" onchange="loadHealth()">
                    <option value="">All states</option>
                    <option value="HEALTHY">Healthy</option>
                    <option value="WARNING">Warning</option>
                    <option value="CRITICAL">Critical</option>
                    <option value="UNREACHABLE">Unreachable</option>
                    <option value="UNKNOWN">Unknown</option>
                    <option value="MAINTENANCE">Maintenance</option>
                </select>
            </div>
            <div style="display:flex; gap:6px;">
                <button class="btn btn-ghost btn-sm" onclick="loadHealth()">Refresh</button>
                <button class="btn btn-primary btn-sm" onclick="showMaintenanceModal()">+ Maintenance</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('health',this)">Server Health</div>
            <div class="tab" onclick="switchTab('maintenance',this)">Maintenance Windows</div>
        </div>

        <!-- Health Table -->
        <div id="healthTab" class="card">
            <table>
                <thead>
                    <tr>
                        <th>Server</th>
                        <th>Host</th>
                        <th>Env</th>
                        <th>Health</th>
                        <th>CPU</th>
                        <th>Memory</th>
                        <th>Disk</th>
                        <th>Load</th>
                        <th>Uptime</th>
                        <th>Last Check</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="healthTable"></tbody>
            </table>
        </div>

        <!-- Maintenance Tab -->
        <div id="maintenanceTab" class="card" style="display:none;">
            <table>
                <thead>
                    <tr><th>Server</th><th>Reason</th><th>Start</th><th>End</th><th>Actions</th></tr>
                </thead>
                <tbody id="maintenanceTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Monitoring Profile</h3>
                <p id="profileServerName"></p>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="field-label">Enabled</label>
                    <select id="profEnabled"><option value="true">Yes</option><option value="false">No</option></select>
                </div>
                <div class="form-group">
                    <label class="field-label">Check Interval (seconds)</label>
                    <input type="number" id="profInterval" min="10" max="3600">
                </div>
                <div style="margin:16px 0 8px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">CPU Thresholds</div>
                <div class="threshold-row">
                    <div class="form-group"><label class="field-label">Warning %</label><input type="number" id="profCpuWarn" step="0.01" min="0" max="100"></div>
                    <div class="form-group"><label class="field-label">Critical %</label><input type="number" id="profCpuCrit" step="0.01" min="0" max="100"></div>
                </div>
                <div style="margin:12px 0 8px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">Memory Thresholds</div>
                <div class="threshold-row">
                    <div class="form-group"><label class="field-label">Warning %</label><input type="number" id="profMemWarn" step="0.01" min="0" max="100"></div>
                    <div class="form-group"><label class="field-label">Critical %</label><input type="number" id="profMemCrit" step="0.01" min="0" max="100"></div>
                </div>
                <div style="margin:12px 0 8px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">Disk Thresholds</div>
                <div class="threshold-row">
                    <div class="form-group"><label class="field-label">Warning %</label><input type="number" id="profDiskWarn" step="0.01" min="0" max="100"></div>
                    <div class="form-group"><label class="field-label">Critical %</label><input type="number" id="profDiskCrit" step="0.01" min="0" max="100"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeProfileModal()">Cancel</button>
                <button class="btn btn-ghost btn-sm" onclick="resetProfile()">Reset Defaults</button>
                <button class="btn-submit" onclick="saveProfile()">Save</button>
            </div>
        </div>
    </div>

    <!-- Maintenance Modal -->
    <div id="maintModal" class="modal-overlay">
        <div class="modal" style="max-width:400px; padding:0; overflow:hidden;">
            <div class="modal-header">
                <h3>Create Maintenance Window</h3>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="field-label">Server</label>
                    <select id="maintServer"></select>
                </div>
                <div class="form-group">
                    <label class="field-label">Reason</label>
                    <input type="text" id="maintReason" maxlength="500" placeholder="e.g. Scheduled patching">
                </div>
                <div class="form-group">
                    <label class="field-label">Start</label>
                    <input type="datetime-local" id="maintStart">
                </div>
                <div class="form-group">
                    <label class="field-label">End</label>
                    <input type="datetime-local" id="maintEnd">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeMaintModal()">Cancel</button>
                <button class="btn-submit" onclick="createMaintWindow()">Create</button>
            </div>
        </div>
    </div>

<script>
document.getElementById('header').innerHTML = headerHTML('Monitoring');

let fleetData = null;
let currentProfileServerId = null;
let environments = new Set();

// ── Load Health ──────────────────────────────────────────

async function loadHealth() {
    try {
        const env = document.getElementById('filterEnv').value;
        const state = document.getElementById('filterState').value;
        let url = '/monitoring/health?';
        if (env) url += 'environment=' + encodeURIComponent(env) + '&';
        if (state) url += 'state=' + encodeURIComponent(state) + '&';

        const res = await apiFetch(url);
        if (!res.ok) throw new Error('Failed to load health data');
        fleetData = await res.json();

        renderSummary(fleetData);
        renderHealthTable(fleetData.servers);

        // Populate env filter
        fleetData.servers.forEach(s => { if (s.environment) environments.add(s.environment); });
        const envSel = document.getElementById('filterEnv');
        const curEnv = envSel.value;
        envSel.innerHTML = '<option value="">All environments</option>';
        environments.forEach(e => envSel.innerHTML += `<option value="${e}" ${e===curEnv?'selected':''}>${e}</option>`);
    } catch (e) {
        showError(e.message);
    }
}

function renderSummary(data) {
    document.getElementById('summaryCards').innerHTML = `
        <div class="summary-card"><div class="num">${data.totalServers}</div><div class="lbl">Total</div></div>
        <div class="summary-card green"><div class="num">${data.healthy}</div><div class="lbl">Healthy</div></div>
        <div class="summary-card yellow"><div class="num">${data.warning}</div><div class="lbl">Warning</div></div>
        <div class="summary-card red"><div class="num">${data.critical}</div><div class="lbl">Critical</div></div>
        <div class="summary-card gray"><div class="num">${data.unreachable}</div><div class="lbl">Unreachable</div></div>
        <div class="summary-card gray"><div class="num">${data.unknown}</div><div class="lbl">Unknown</div></div>
        <div class="summary-card blue"><div class="num">${data.maintenance}</div><div class="lbl">Maintenance</div></div>
    `;
}

function renderHealthTable(servers) {
    const tbody = document.getElementById('healthTable');
    if (!servers || servers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:var(--text-muted);padding:32px;">No servers found</td></tr>';
        return;
    }

    let html = '';
    for (const s of servers) {
        html += `<tr class="cursor-pointer" onclick="toggleDetail('${s.serverId}')">
            <td><strong>${esc(s.serverName)}</strong></td>
            <td class="text-mono text-sm">${esc(s.hostname)}</td>
            <td><span class="badge badge-soon">${esc(s.environment || '-')}</span></td>
            <td><span class="health-badge health-${s.overallState}">${s.overallState}</span></td>
            <td>${metricBar(s.cpuUsage)}</td>
            <td>${metricBar(s.memoryUsage)}</td>
            <td>${metricBar(s.diskUsage)}</td>
            <td class="text-mono text-sm">${s.load1m != null ? s.load1m.toFixed(2) : '—'}</td>
            <td class="text-sm">${formatUptime(s.uptimeSeconds)}</td>
            <td class="text-sm">${formatAgo(s.lastCheckAt)}</td>
            <td>
                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();triggerCheck('${s.serverId}',this)">Check</button>
                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openProfile('${s.serverId}','${esc(s.serverName)}')">Config</button>
            </td>
        </tr>
        <tr class="detail-row" id="detail-${s.serverId}">
            <td colspan="11"><div class="detail-panel" id="detailPanel-${s.serverId}">Loading...</div></td>
        </tr>`;
    }
    tbody.innerHTML = html;
}

function metricBar(value) {
    if (value == null) return '<span class="text-sm" style="color:var(--text-muted);">—</span>';
    const color = value >= 95 ? 'red' : value >= 80 ? 'yellow' : 'green';
    return `<div class="metric-bar">
        <span class="text-mono text-sm">${value.toFixed(1)}%</span>
        <div class="metric-bar-track"><div class="metric-bar-fill ${color}" style="width:${Math.min(value,100)}%"></div></div>
    </div>`;
}

// ── Detail Panel ────────────────────────────────────────

async function toggleDetail(serverId) {
    const row = document.getElementById('detail-' + serverId);
    if (row.classList.contains('show')) {
        row.classList.remove('show');
        return;
    }
    // Close others
    document.querySelectorAll('.detail-row.show').forEach(r => r.classList.remove('show'));
    row.classList.add('show');
    await loadDetail(serverId);
}

async function loadDetail(serverId) {
    const panel = document.getElementById('detailPanel-' + serverId);
    try {
        const [healthRes, metricsRes] = await Promise.all([
            apiFetch('/monitoring/health/' + serverId),
            apiFetch('/monitoring/metrics/' + serverId + '/latest')
        ]);
        const health = await healthRes.json();
        const metrics = await metricsRes.json();

        let metricsHtml = '';
        const metricLabels = {
            CPU_USAGE_PERCENT: 'CPU', MEMORY_USAGE_PERCENT: 'Memory', DISK_USAGE_PERCENT: 'Disk',
            LOAD_1M: 'Load 1m', LOAD_5M: 'Load 5m', LOAD_15M: 'Load 15m',
            UPTIME_SECONDS: 'Uptime', PROCESS_COUNT: 'Processes', SWAP_USAGE_PERCENT: 'Swap'
        };

        for (const m of metrics) {
            const label = m.label ? ` (${m.label})` : '';
            const name = (metricLabels[m.metricType] || m.metricType) + label;
            const val = m.metricType.includes('PERCENT') ? m.value.toFixed(1) + '%' :
                        m.metricType === 'UPTIME_SECONDS' ? formatUptime(m.value) :
                        m.metricType.includes('BYTES') ? formatBytes(m.value) :
                        typeof m.value === 'number' ? m.value.toFixed(2) : m.value;
            metricsHtml += `<div class="detail-metric"><div class="val">${val}</div><div class="label">${esc(name)}</div></div>`;
        }

        panel.innerHTML = `
            <div class="detail-grid">${metricsHtml || '<div style="color:var(--text-muted);">No metrics collected yet</div>'}</div>
            <div class="chart-area">
                <div class="chart-controls">
                    <button class="active" onclick="loadChart('${serverId}','1h',this)">1h</button>
                    <button onclick="loadChart('${serverId}','6h',this)">6h</button>
                    <button onclick="loadChart('${serverId}','24h',this)">24h</button>
                    <button onclick="loadChart('${serverId}','7d',this)">7d</button>
                    <span style="margin-left:8px;font-size:11px;color:var(--text-muted);">CPU / Memory / Disk</span>
                </div>
                <canvas id="chart-${serverId}" height="180"></canvas>
            </div>`;
        loadChart(serverId, '1h', panel.querySelector('.chart-controls button'));
    } catch (e) {
        panel.innerHTML = '<div style="color:var(--danger);">Failed to load details: ' + esc(e.message) + '</div>';
    }
}

// ── Simple Canvas Chart ─────────────────────────────────

async function loadChart(serverId, range, btn) {
    // Update active button
    if (btn) {
        btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    const durations = { '1h': 1, '6h': 6, '24h': 24, '7d': 168 };
    const hours = durations[range] || 1;
    const from = new Date(Date.now() - hours * 3600000).toISOString();
    const to = new Date().toISOString();

    const types = ['CPU_USAGE_PERCENT', 'MEMORY_USAGE_PERCENT', 'DISK_USAGE_PERCENT'];
    const colors = ['#6c8aff', '#4ecdc4', '#ffd93d'];
    const labels = ['CPU', 'Memory', 'Disk'];

    const datasets = await Promise.all(types.map(async type => {
        try {
            const res = await apiFetch(`/monitoring/metrics/${serverId}?type=${type}&from=${from}&to=${to}`);
            if (!res.ok) return [];
            const data = await res.json();
            return data.dataPoints || [];
        } catch { return []; }
    }));

    const canvas = document.getElementById('chart-' + serverId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width = canvas.offsetWidth;
    const H = canvas.height = 180;
    const pad = { t: 20, r: 16, b: 24, l: 40 };

    ctx.clearRect(0, 0, W, H);

    // Background grid
    ctx.strokeStyle = '#2e3345';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
        const y = pad.t + (H - pad.t - pad.b) * i / 4;
        ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
        ctx.fillStyle = '#8b8fa3'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
        ctx.fillText((100 - 25 * i) + '%', pad.l - 6, y + 3);
    }

    const fromMs = new Date(from).getTime();
    const toMs = new Date(to).getTime();

    datasets.forEach((points, idx) => {
        if (points.length === 0) return;
        ctx.strokeStyle = colors[idx];
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        points.forEach((p, i) => {
            const t = new Date(p.timestamp).getTime();
            const x = pad.l + (t - fromMs) / (toMs - fromMs) * (W - pad.l - pad.r);
            const y = pad.t + (1 - p.value / 100) * (H - pad.t - pad.b);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    });

    // Legend
    labels.forEach((l, i) => {
        const x = pad.l + i * 80;
        ctx.fillStyle = colors[i]; ctx.fillRect(x, H - 12, 10, 3);
        ctx.fillStyle = '#8b8fa3'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(l, x + 14, H - 8);
    });
}

// ── Trigger Check ───────────────────────────────────────

async function triggerCheck(serverId, btn) {
    btn.disabled = true; btn.textContent = '...';
    try {
        const res = await apiFetch('/monitoring/check/' + serverId, { method: 'POST' });
        if (res.ok) {
            showSuccess('Check queued');
            setTimeout(loadHealth, 3000);
        } else {
            showError('Failed to trigger check');
        }
    } catch (e) { showError(e.message); }
    finally { btn.disabled = false; btn.textContent = 'Check'; }
}

// ── Profile Modal ───────────────────────────────────────

async function openProfile(serverId, serverName) {
    currentProfileServerId = serverId;
    document.getElementById('profileServerName').textContent = serverName;
    try {
        const res = await apiFetch('/monitoring/profiles/' + serverId);
        if (!res.ok) throw new Error('Failed to load profile');
        const p = await res.json();
        document.getElementById('profEnabled').value = String(p.enabled);
        document.getElementById('profInterval').value = p.checkIntervalSeconds;
        document.getElementById('profCpuWarn').value = p.cpuWarningThreshold;
        document.getElementById('profCpuCrit').value = p.cpuCriticalThreshold;
        document.getElementById('profMemWarn').value = p.memoryWarningThreshold;
        document.getElementById('profMemCrit').value = p.memoryCriticalThreshold;
        document.getElementById('profDiskWarn').value = p.diskWarningThreshold;
        document.getElementById('profDiskCrit').value = p.diskCriticalThreshold;
        document.getElementById('profileModal').classList.add('show');
    } catch (e) { showError(e.message); }
}

function closeProfileModal() { document.getElementById('profileModal').classList.remove('show'); }

async function saveProfile() {
    try {
        const body = {
            enabled: document.getElementById('profEnabled').value === 'true',
            checkIntervalSeconds: parseInt(document.getElementById('profInterval').value),
            cpuWarningThreshold: parseFloat(document.getElementById('profCpuWarn').value),
            cpuCriticalThreshold: parseFloat(document.getElementById('profCpuCrit').value),
            memoryWarningThreshold: parseFloat(document.getElementById('profMemWarn').value),
            memoryCriticalThreshold: parseFloat(document.getElementById('profMemCrit').value),
            diskWarningThreshold: parseFloat(document.getElementById('profDiskWarn').value),
            diskCriticalThreshold: parseFloat(document.getElementById('profDiskCrit').value)
        };
        const res = await apiFetch('/monitoring/profiles/' + currentProfileServerId, {
            method: 'PATCH', body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error('Failed to save profile');
        closeProfileModal();
        showSuccess('Profile updated');
    } catch (e) { showError(e.message); }
}

async function resetProfile() {
    if (!confirm('Reset monitoring profile to defaults?')) return;
    try {
        const res = await apiFetch('/monitoring/profiles/' + currentProfileServerId + '/reset', { method: 'POST' });
        if (!res.ok) throw new Error('Failed to reset profile');
        closeProfileModal();
        showSuccess('Profile reset to defaults');
    } catch (e) { showError(e.message); }
}

// ── Maintenance ─────────────────────────────────────────

function showMaintenanceModal() {
    populateServerSelect();
    document.getElementById('maintModal').classList.add('show');
}
function closeMaintModal() { document.getElementById('maintModal').classList.remove('show'); }

function populateServerSelect() {
    const sel = document.getElementById('maintServer');
    sel.innerHTML = '';
    if (fleetData && fleetData.servers) {
        fleetData.servers.forEach(s => sel.innerHTML += `<option value="${s.serverId}">${esc(s.serverName)}</option>`);
    }
}

async function createMaintWindow() {
    try {
        const start = new Date(document.getElementById('maintStart').value).toISOString();
        const end = new Date(document.getElementById('maintEnd').value).toISOString();
        const body = {
            serverId: document.getElementById('maintServer').value,
            reason: document.getElementById('maintReason').value,
            startAt: start,
            endAt: end
        };
        const res = await apiFetch('/monitoring/maintenance', { method: 'POST', body: JSON.stringify(body) });
        if (!res.ok) { const err = await res.json(); throw new Error(err.message || 'Failed'); }
        closeMaintModal();
        showSuccess('Maintenance window created');
        loadMaintenance();
    } catch (e) { showError(e.message); }
}

async function loadMaintenance() {
    try {
        const res = await apiFetch('/monitoring/maintenance');
        if (!res.ok) throw new Error('Failed to load maintenance');
        const windows = await res.json();
        const tbody = document.getElementById('maintenanceTable');
        if (!windows.length) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:24px;">No maintenance windows</td></tr>'; return; }
        tbody.innerHTML = windows.map(w => `<tr>
            <td>${esc(w.serverName)}</td>
            <td>${esc(w.reason)}</td>
            <td class="text-sm">${formatDate(w.startAt)}</td>
            <td class="text-sm">${formatDate(w.endAt)}</td>
            <td><button class="btn btn-ghost btn-sm" onclick="deleteMaint('${w.id}')">Cancel</button></td>
        </tr>`).join('');
    } catch (e) { showError(e.message); }
}

async function deleteMaint(id) {
    if (!confirm('Cancel this maintenance window?')) return;
    try {
        const res = await apiFetch('/monitoring/maintenance/' + id, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed to delete');
        showSuccess('Maintenance window cancelled');
        loadMaintenance();
        loadHealth();
    } catch (e) { showError(e.message); }
}

// ── Tabs ────────────────────────────────────────────────

function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('healthTab').style.display = tab === 'health' ? '' : 'none';
    document.getElementById('maintenanceTab').style.display = tab === 'maintenance' ? '' : 'none';
    if (tab === 'maintenance') loadMaintenance();
}

// ── Utilities ───────────────────────────────────────────

function formatUptime(seconds) {
    if (seconds == null) return '—';
    const d = Math.floor(seconds / 86400);
    const h = Math.floor((seconds % 86400) / 3600);
    if (d > 0) return d + 'd ' + h + 'h';
    const m = Math.floor((seconds % 3600) / 60);
    return h + 'h ' + m + 'm';
}

function formatBytes(b) {
    if (b == null) return '—';
    const units = ['B','KB','MB','GB','TB'];
    let i = 0;
    while (b >= 1024 && i < units.length - 1) { b /= 1024; i++; }
    return b.toFixed(1) + ' ' + units[i];
}

function formatAgo(iso) {
    if (!iso) return '—';
    const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
}

function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Init ────────────────────────────────────────────────

loadHealth();
setInterval(loadHealth, 30000);
</script>
