<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secrets - OpenClaw Control Plane</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <script src="common.js"></script>
    <script>requireAuth();</script>

    <div id="header"></div>
    <div class="container">
        <div id="alert" class="alert"></div>

        <div class="flex-between mb-16">
            <h2>Secrets</h2>
        </div>

        <div class="card" style="padding: 0; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Value</th>
                        <th>Description</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="secretsTable">
                    <tr><td colspan="6" class="text-muted" style="text-align:center;padding:32px;">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Create / Edit Modal -->
    <div class="modal-overlay" id="secretModal">
        <div class="modal">
            <h3 id="modalTitle">New Secret</h3>
            <form id="secretForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="secretName">Name</label>
                    <input type="text" id="secretName" required maxlength="100" placeholder="my-ssh-key">
                </div>
                <div class="form-group" id="typeGroup">
                    <label for="secretType">Type</label>
                    <select id="secretType" required>
                        <option value="SSH_PASSWORD">SSH_PASSWORD</option>
                        <option value="SSH_PRIVATE_KEY">SSH_PRIVATE_KEY</option>
                        <option value="API_KEY">API_KEY</option>
                        <option value="DNS_TOKEN">DNS_TOKEN</option>
                        <option value="DEPLOYMENT_TOKEN">DEPLOYMENT_TOKEN</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="secretValue" id="valueLabel">Value</label>
                    <textarea id="secretValue" rows="3" placeholder="Enter secret value"></textarea>
                </div>
                <div class="form-group">
                    <label for="secretDesc">Description</label>
                    <input type="text" id="secretDesc" placeholder="Optional description">
                </div>
                <div id="modalAlert" class="alert"></div>
                <div class="flex-between mt-8">
                    <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('header').innerHTML = headerHTML('Secrets');

        let currentPage = 0;
        const pageSize = 15;

        async function loadSecrets(page = 0) {
            currentPage = page;
            const res = await apiFetch(`/secrets?page=${page}&size=${pageSize}&sort=createdAt,desc`);
            if (!res.ok) { showError('Failed to load secrets'); return; }
            const data = await res.json();
            renderTable(data.content);
            renderPagination(data);
        }

        function renderTable(secrets) {
            const tbody = document.getElementById('secretsTable');
            if (!secrets.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="text-align:center;padding:32px;">No secrets found</td></tr>';
                return;
            }
            tbody.innerHTML = secrets.map(s => `
                <tr>
                    <td><strong>${esc(s.name)}</strong></td>
                    <td><span class="badge">${s.type}</span></td>
                    <td class="text-muted" style="font-family:var(--mono);font-size:12px;">\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022</td>
                    <td class="text-muted text-sm">${esc(s.description || '-')}</td>
                    <td class="text-sm text-muted" style="white-space:nowrap;">${formatDate(s.createdAt)}</td>
                    <td>
                        <button class="btn btn-ghost btn-sm" onclick="showEditModal('${s.id}','${esc(s.name)}','${esc(s.description || '')}')">Edit</button>
                        <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="confirmDelete('${s.id}','${esc(s.name)}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderPagination(data) {
            const el = document.getElementById('pagination');
            if (data.totalPages <= 1) { el.innerHTML = `<span>${data.totalElements} secrets</span>`; return; }
            el.innerHTML = `
                <button class="btn btn-ghost btn-sm" ${data.first ? 'disabled' : ''} onclick="loadSecrets(${currentPage - 1})">Prev</button>
                <span>Page ${data.number + 1} of ${data.totalPages} (${data.totalElements} secrets)</span>
                <button class="btn btn-ghost btn-sm" ${data.last ? 'disabled' : ''} onclick="loadSecrets(${currentPage + 1})">Next</button>
            `;
        }

        function showCreateModal() {
            document.getElementById('modalTitle').textContent = 'New Secret';
            document.getElementById('submitBtn').textContent = 'Create';
            document.getElementById('editId').value = '';
            document.getElementById('secretName').value = '';
            document.getElementById('secretType').value = 'SSH_PASSWORD';
            document.getElementById('secretValue').value = '';
            document.getElementById('secretValue').required = true;
            document.getElementById('secretDesc').value = '';
            document.getElementById('typeGroup').style.display = '';
            document.getElementById('valueLabel').textContent = 'Value';
            hideAlert('modalAlert');
            document.getElementById('secretModal').classList.add('show');
        }

        function showEditModal(id, name, description) {
            document.getElementById('modalTitle').textContent = 'Edit Secret';
            document.getElementById('submitBtn').textContent = 'Save';
            document.getElementById('editId').value = id;
            document.getElementById('secretName').value = name;
            document.getElementById('secretValue').value = '';
            document.getElementById('secretValue').required = false;
            document.getElementById('secretDesc').value = description;
            document.getElementById('typeGroup').style.display = 'none';
            document.getElementById('valueLabel').textContent = 'New Value (leave blank to keep current)';
            hideAlert('modalAlert');
            document.getElementById('secretModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('secretModal').classList.remove('show');
        }

        document.getElementById('secretForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert('modalAlert');
            const id = document.getElementById('editId').value;
            const name = document.getElementById('secretName').value;
            const value = document.getElementById('secretValue').value;
            const description = document.getElementById('secretDesc').value;

            try {
                if (id) {
                    const body = { name, description };
                    if (value) body.value = value;
                    const res = await apiFetch(`/secrets/${id}`, { method: 'PATCH', body: JSON.stringify(body) });
                    if (!res.ok) { const err = await res.json(); showError(err.message || 'Update failed', 'modalAlert'); return; }
                } else {
                    const type = document.getElementById('secretType').value;
                    const res = await apiFetch('/secrets', {
                        method: 'POST',
                        body: JSON.stringify({ name, type, value, description: description || null })
                    });
                    if (!res.ok) { const err = await res.json(); showError(err.message || 'Create failed', 'modalAlert'); return; }
                }
                closeModal();
                loadSecrets(currentPage);
                showSuccess(id ? 'Secret updated' : 'Secret created');
            } catch (err) {
                showError(err.message, 'modalAlert');
            }
        });

        async function confirmDelete(id, name) {
            if (!confirm(`Delete secret "${name}"? This cannot be undone.`)) return;
            const res = await apiFetch(`/secrets/${id}`, { method: 'DELETE' });
            if (!res.ok && res.status !== 204) { showError('Failed to delete secret'); return; }
            loadSecrets(currentPage);
            showSuccess('Secret deleted');
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        loadSecrets();
    </script>
</body>
</html>
