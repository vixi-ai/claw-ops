<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servers - OpenClaw Control Plane</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* Modal override for wider server form */
        #serverModal .modal { max-width: 500px; padding: 0; overflow: hidden; }

        /* Modal header */
        .modal-header { padding: 24px 24px 4px; }
        .modal-header h3 { font-size: 15px; font-weight: 600; margin: 0; }
        .modal-header p { font-size: 11px; color: var(--text-muted); margin: 2px 0 0; }

        /* Scrollable body */
        .modal-body { max-height: 60vh; overflow-y: auto; padding: 16px 24px 8px; }

        /* Section divider */
        .section-header { display: flex; align-items: center; gap: 8px; margin: 20px 0 12px; }
        .section-header:first-child { margin-top: 0; }
        .section-header span { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); white-space: nowrap; }
        .section-header .line { flex: 1; height: 1px; background: var(--border); }

        /* Field label */
        .field-label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
        .field-label .req { color: var(--danger); opacity: 0.7; }
        .field-label .opt { font-weight: 400; opacity: 0.5; margin-left: 4px; }

        /* Segmented control */
        .segment-control { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--surface-hover); }
        .segment-btn { flex: 1; padding: 7px 12px; text-align: center; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text-muted); transition: all 0.15s; font-family: var(--font); }
        .segment-btn.active { background: var(--text); color: var(--bg); }

        /* Password wrapper with toggle */
        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 36px; }
        .pw-toggle { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px; font-size: 13px; line-height: 1; }
        .pw-toggle:hover { color: var(--text); }

        /* File upload area */
        .file-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .upload-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--text-muted); cursor: pointer; font-family: var(--font); transition: all 0.15s; }
        .upload-btn:hover { background: var(--surface-hover); color: var(--text); }
        .file-info { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text); min-width: 0; }
        .file-info span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-clear { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px; font-size: 14px; line-height: 1; }
        .file-clear:hover { color: var(--text); }

        /* Key textarea */
        .key-textarea { font-family: var(--mono); font-size: 11px; line-height: 1.6; resize: none; }

        /* Modal footer */
        .modal-footer { display: flex; justify-content: flex-end; align-items: center; gap: 8px; padding: 16px 24px; border-top: 1px solid var(--border); }
        .btn-cancel { background: transparent; border: none; padding: 8px 16px; font-size: 13px; color: var(--text-muted); cursor: pointer; font-family: var(--font); border-radius: var(--radius); }
        .btn-cancel:hover { color: var(--text); }
        .btn-submit { padding: 8px 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--border); border-radius: var(--radius); background: var(--text); color: var(--bg); cursor: pointer; font-family: var(--font); transition: opacity 0.15s; }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Form error */
        .form-error { font-size: 11px; color: var(--danger); margin-top: 12px; }

        /* Spacing helpers */
        .gap-12 { gap: 12px; }
        .mt-12 { margin-top: 12px; }
        .mb-0 { margin-bottom: 0; }
        .hidden { display: none !important; }

        /* SSL Job Log Modal */
        #sslLogModal .modal { max-width: 620px; }
        .job-step { font-size: 11px; padding: 3px 8px; border-radius: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .job-step.running { background: #fef3c7; color: #92400e; }
        .job-step.completed { background: #d1fae5; color: #065f46; }
        .job-step.failed { background: #fee2e2; color: #991b1b; }
        .job-log-box {
            background: #0d1117; color: #c9d1d9; font-family: var(--mono); font-size: 11px;
            line-height: 1.6; padding: 12px; border-radius: 6px; max-height: 320px;
            overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin-top: 12px;
        }
        .job-error-box {
            background: #1c0a0a; color: #fca5a5; font-family: var(--mono); font-size: 11px;
            line-height: 1.5; padding: 10px 12px; border-radius: 6px; border: 1px solid #7f1d1d;
            margin-top: 8px; white-space: pre-wrap; word-break: break-all;
        }
        .job-meta { display: flex; gap: 16px; font-size: 11px; color: var(--text-muted); margin-top: 8px; flex-wrap: wrap; }
        .job-meta span { white-space: nowrap; }
    </style>
</head>
<body>
    <script src="common.js"></script>
    <script>requireAuth();</script>

    <div id="header"></div>
    <div class="container">
        <div id="alert" class="alert"></div>

        <div class="flex-between mb-16">
            <h2>Servers</h2>
            <button class="btn btn-primary" onclick="showCreateModal()">+ New Server</button>
        </div>

        <div class="card" style="padding: 0; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Host</th>
                        <th>Domain</th>
                        <th>Port</th>
                        <th>Environment</th>
                        <th>Auth</th>
                        <th>Status</th>
                        <th>SSL</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="serversTable">
                    <tr><td colspan="9" class="text-muted" style="text-align:center;padding:32px;">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Server Modal -->
    <div class="modal-overlay" id="serverModal">
        <div class="modal">
            <form id="serverForm" novalidate>
                <input type="hidden" id="editId">
                <input type="hidden" id="serverAuthType" value="PASSWORD">

                <!-- Header -->
                <div class="modal-header">
                    <h3 id="modalTitle">Add Server</h3>
                    <p id="modalSubtitle">Register a server and configure SSH connection</p>
                </div>

                <!-- Scrollable body -->
                <div class="modal-body">

                    <!-- Section: Server -->
                    <div class="section-header"><span>Server</span><div class="line"></div></div>

                    <div class="form-group">
                        <label class="field-label">Name <span class="req">*</span></label>
                        <input type="text" id="serverName" required maxlength="100" placeholder="e.g. Production Server">
                    </div>

                    <div class="form-group">
                        <label class="field-label">Host <span class="req">*</span></label>
                        <input type="text" id="serverHost" required placeholder="IP or hostname — e.g. 192.168.1.100 or ec2-18-195-27-116.eu-central-1.compute.amazonaws.com">
                    </div>

                    <div style="display:flex;" class="gap-12">
                        <div class="form-group" style="flex:1;">
                            <label class="field-label">Environment <span class="opt">optional</span></label>
                            <input type="text" id="serverEnv" placeholder="production (default)">
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label class="field-label">Domain <span class="opt">optional</span></label>
                            <select id="serverZone">
                                <option value="">No domain</option>
                            </select>
                        </div>
                    </div>

                    <!-- Section: Connection -->
                    <div class="section-header"><span>Connection</span><div class="line"></div></div>

                    <div style="display:flex;" class="gap-12">
                        <div class="form-group" style="flex:1;">
                            <label class="field-label">Username <span class="req">*</span></label>
                            <input type="text" id="serverUsername" required placeholder="root">
                        </div>
                        <div class="form-group" style="width:80px;">
                            <label class="field-label">Port</label>
                            <input type="number" id="serverPort" value="22" min="1" max="65535">
                        </div>
                    </div>

                    <!-- Auth method segmented control -->
                    <div class="form-group">
                        <label class="field-label">Authentication <span class="req">*</span></label>
                        <div class="segment-control">
                            <button type="button" class="segment-btn active" id="segPassword" onclick="setAuthType('PASSWORD')">Password</button>
                            <button type="button" class="segment-btn" id="segKey" onclick="setAuthType('PRIVATE_KEY')">Private Key</button>
                        </div>
                    </div>

                    <!-- PASSWORD fields -->
                    <div id="authPassword">
                        <div class="form-group mb-0">
                            <label class="field-label">Password <span class="req">*</span></label>
                            <div class="pw-wrap">
                                <input type="password" id="sshPassword" placeholder="SSH password" autocomplete="off">
                                <button type="button" class="pw-toggle" onclick="toggleVis('sshPassword', this)" title="Show/hide">&#128065;</button>
                            </div>
                        </div>
                    </div>

                    <!-- PRIVATE KEY fields -->
                    <div id="authPrivateKey" class="hidden">
                        <div class="form-group">
                            <label class="field-label">Private Key <span class="req">*</span></label>
                            <div class="file-row">
                                <button type="button" class="upload-btn" onclick="document.getElementById('keyFileInput').click()">&#8679; Upload file</button>
                                <div id="fileInfo" class="file-info hidden">
                                    <span id="fileName"></span>
                                    <button type="button" class="file-clear" onclick="clearKeyFile()" title="Remove">&times;</button>
                                </div>
                            </div>
                            <input type="file" id="keyFileInput" accept=".pem,.key,id_rsa,id_ed25519,id_ecdsa" style="display:none;" onchange="handleKeyFile(event)">
                            <textarea id="privateKeyContent" rows="5" class="key-textarea" placeholder="Or paste private key content here..."></textarea>
                        </div>

                        <div class="form-group mb-0">
                            <label class="field-label">Key Passphrase <span class="opt">optional</span></label>
                            <div class="pw-wrap">
                                <input type="password" id="keyPassphrase" placeholder="If key is passphrase-protected" autocomplete="off">
                                <button type="button" class="pw-toggle" onclick="toggleVis('keyPassphrase', this)" title="Show/hide">&#128065;</button>
                            </div>
                        </div>
                    </div>

                    <!-- Error -->
                    <div id="formError" class="form-error hidden"></div>
                </div>

                <!-- Footer -->
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-submit" id="submitBtn">Add server</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SSL Provisioning Log Modal -->
    <div class="modal-overlay" id="sslLogModal">
        <div class="modal" style="padding:24px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <h3 style="margin:0;font-size:15px;" id="sslLogTitle">SSL Provisioning</h3>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span class="job-step" id="sslLogStep">—</span>
                    <button class="btn-cancel" onclick="closeSslLog()" style="padding:4px 8px;">&times;</button>
                </div>
            </div>
            <div class="job-meta" id="sslLogMeta"></div>
            <div id="sslLogError" class="job-error-box hidden"></div>
            <div id="sslLogBox" class="job-log-box">Waiting for logs...</div>
            <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px;">
                <button class="btn btn-ghost btn-sm" id="sslLogRetryBtn" onclick="retrySslJob()" style="display:none;">Retry</button>
                <button class="btn btn-ghost btn-sm" onclick="closeSslLog()">Close</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('header').innerHTML = headerHTML('Servers');

        let currentPage = 0;
        const pageSize = 15;

        const statusColors = {
            ONLINE: 'badge-active',
            OFFLINE: 'badge-error',
            UNKNOWN: 'badge-soon',
            ERROR: 'badge-warning'
        };

        // ── Auth type toggle ──
        function setAuthType(type) {
            document.getElementById('serverAuthType').value = type;
            document.getElementById('segPassword').classList.toggle('active', type === 'PASSWORD');
            document.getElementById('segKey').classList.toggle('active', type === 'PRIVATE_KEY');
            document.getElementById('authPassword').classList.toggle('hidden', type !== 'PASSWORD');
            document.getElementById('authPrivateKey').classList.toggle('hidden', type !== 'PRIVATE_KEY');
        }

        // ── Password visibility toggle ──
        function toggleVis(inputId, btn) {
            const inp = document.getElementById(inputId);
            const isPassword = inp.type === 'password';
            inp.type = isPassword ? 'text' : 'password';
            btn.innerHTML = isPassword ? '&#128064;' : '&#128065;';
        }

        // ── Key file handling ──
        function handleKeyFile(e) {
            const file = e.target.files?.[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                const text = reader.result;
                if (!text.includes('-----BEGIN') || !text.includes('PRIVATE KEY-----')) {
                    showFormError('Invalid key file — must contain a private key in PEM format.');
                    return;
                }
                document.getElementById('privateKeyContent').value = text;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileInfo').classList.remove('hidden');
                hideFormError();
            };
            reader.onerror = () => showFormError('Failed to read file.');
            reader.readAsText(file);
        }

        function clearKeyFile() {
            document.getElementById('privateKeyContent').value = '';
            document.getElementById('keyFileInput').value = '';
            document.getElementById('fileInfo').classList.add('hidden');
        }

        // ── Error display ──
        function showFormError(msg) {
            const el = document.getElementById('formError');
            el.textContent = msg;
            el.classList.remove('hidden');
        }
        function hideFormError() {
            document.getElementById('formError').classList.add('hidden');
        }

        // ── Inline secret creation ──
        async function createSecret(name, type, value) {
            const res = await apiFetch('/secrets', {
                method: 'POST',
                body: JSON.stringify({ name, type, value })
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.message || 'Failed to create credential');
            }
            return (await res.json()).id;
        }

        // ── Form submit ──
        document.getElementById('serverForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideFormError();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            const origText = btn.textContent;
            btn.textContent = 'Saving...';

            try {
                const id = document.getElementById('editId').value;
                const serverName = document.getElementById('serverName').value.trim();
                const authType = document.getElementById('serverAuthType').value;

                if (!serverName) { showFormError('Server name is required.'); return; }
                if (!document.getElementById('serverHost').value.trim()) { showFormError('Host is required.'); return; }
                if (!document.getElementById('serverUsername').value.trim()) { showFormError('SSH username is required.'); return; }

                // Resolve credentials (only create new ones if user entered values)
                let credentialId = null;
                let passphraseCredentialId = null;
                const ts = Date.now();

                if (authType === 'PASSWORD') {
                    const pw = document.getElementById('sshPassword').value;
                    if (!id && !pw) { showFormError('SSH password is required.'); return; }
                    if (pw) {
                        credentialId = await createSecret(serverName + '-pw-' + ts, 'SSH_PASSWORD', pw);
                    }
                } else {
                    const key = document.getElementById('privateKeyContent').value;
                    if (!id && !key.trim()) { showFormError('A private key is required.'); return; }
                    if (key.trim()) {
                        credentialId = await createSecret(serverName + '-key-' + ts, 'SSH_PRIVATE_KEY', key);
                    }

                    const pp = document.getElementById('keyPassphrase').value;
                    if (pp.trim()) {
                        passphraseCredentialId = await createSecret(serverName + '-pp-' + ts, 'SSH_PASSWORD', pp);
                    }
                }

                const host = document.getElementById('serverHost').value.trim();
                const isIp = /^\d+\.\d+\.\d+\.\d+$/.test(host);
                const body = {
                    name: serverName,
                    hostname: host,
                    ipAddress: isIp ? host : null,
                    sshPort: parseInt(document.getElementById('serverPort').value) || 22,
                    sshUsername: document.getElementById('serverUsername').value.trim(),
                    authType,
                    credentialId,
                    passphraseCredentialId,
                    environment: document.getElementById('serverEnv').value.trim() || null,
                    zoneId: !id ? (document.getElementById('serverZone').value || null) : undefined
                };

                const res = await apiFetch(id ? `/servers/${id}` : '/servers', {
                    method: id ? 'PATCH' : 'POST',
                    body: JSON.stringify(body)
                });
                if (!res.ok) {
                    const err = await res.json();
                    showFormError(err.message || err.messages?.map(m => m.message).join(', ') || 'Operation failed');
                    return;
                }

                const serverData = await res.json();
                closeModal();
                loadServers(currentPage);
                if (!id && serverData.assignedDomain) {
                    showSuccess('Server created with domain: ' + serverData.assignedDomain);
                } else {
                    showSuccess(id ? 'Server updated' : 'Server created');
                }
            } catch (err) {
                showFormError(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = origText;
            }
        });

        // ── Modal lifecycle ──
        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('serverName').value = '';
            document.getElementById('serverHost').value = '';
            document.getElementById('serverPort').value = '22';
            document.getElementById('serverUsername').value = '';
            document.getElementById('serverEnv').value = '';
            document.getElementById('serverZone').innerHTML = '<option value="">No domain</option>';
            document.getElementById('sshPassword').value = '';
            document.getElementById('sshPassword').type = 'password';
            document.getElementById('privateKeyContent').value = '';
            document.getElementById('keyPassphrase').value = '';
            document.getElementById('keyPassphrase').type = 'password';
            clearKeyFile();
            setAuthType('PASSWORD');
            hideFormError();
        }

        async function loadZoneOptions() {
            const sel = document.getElementById('serverZone');
            sel.innerHTML = '<option value="">Loading zones...</option>';
            try {
                const res = await apiFetch('/zones?page=0&size=100');
                if (!res.ok) { sel.innerHTML = '<option value="">No domain</option>'; return; }
                const data = await res.json();
                const activeZones = (data.content || []).filter(z => z.active);
                sel.innerHTML = '<option value="">No domain</option>' +
                    activeZones.map(z => `<option value="${z.id}" ${z.defaultForAutoAssign ? 'selected' : ''}>${esc(z.zoneName)}${z.defaultForAutoAssign ? ' (default)' : ''}</option>`).join('');
            } catch (e) {
                sel.innerHTML = '<option value="">No domain</option>';
            }
        }

        function showCreateModal() {
            resetForm();
            document.getElementById('modalTitle').textContent = 'Add Server';
            document.getElementById('modalSubtitle').textContent = 'Register a server and configure SSH connection';
            document.getElementById('submitBtn').textContent = 'Add server';
            loadZoneOptions();
            document.getElementById('serverModal').classList.add('show');
        }

        function showEditModal(s) {
            resetForm();
            document.getElementById('modalTitle').textContent = 'Edit Server';
            document.getElementById('modalSubtitle').textContent = 'Update server details and connection';
            document.getElementById('submitBtn').textContent = 'Save changes';
            document.getElementById('editId').value = s.id;
            document.getElementById('serverName').value = s.name;
            document.getElementById('serverHost').value = s.hostname || s.ipAddress || '';
            document.getElementById('serverPort').value = s.sshPort;
            document.getElementById('serverUsername').value = s.sshUsername;
            document.getElementById('serverEnv').value = s.environment;
            setAuthType(s.authType);
            document.getElementById('serverModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('serverModal').classList.remove('show');
        }

        // ── Table rendering ──
        async function loadServers(page = 0) {
            currentPage = page;
            const res = await apiFetch(`/servers?page=${page}&size=${pageSize}&sort=createdAt,desc`);
            if (!res.ok) { showError('Failed to load servers'); return; }
            const data = await res.json();
            renderTable(data.content);
            renderPagination(data);
        }

        async function renderTable(servers) {
            const tbody = document.getElementById('serversTable');
            if (!servers.length) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-muted" style="text-align:center;padding:32px;">No servers found</td></tr>';
                return;
            }
            // Load SSL status and domain assignments for all servers
            const sslMap = {};
            const assignmentMap = {};
            await Promise.all(servers.map(async s => {
                try {
                    const r = await apiFetch(`/ssl-certificates/server/${s.id}`);
                    if (r.ok) sslMap[s.id] = await r.json();
                } catch (e) {}
                try {
                    const r = await apiFetch(`/domain-assignments?resourceId=${s.id}`);
                    if (r.ok) {
                        const data = await r.json();
                        // API returns a plain array (not paged) when filtering by resourceId
                        const list = Array.isArray(data) ? data : (data.content || []);
                        const active = list.find(a => a.hostname === s.assignedDomain && a.status !== 'RELEASED')
                            || list.find(a => a.status !== 'RELEASED');
                        if (active) assignmentMap[s.id] = active;
                    }
                } catch (e) {}
            }));

            tbody.innerHTML = servers.map(s => {
                const authLabel = s.authType === 'PASSWORD' ? 'Password'
                    : s.passphraseCredentialId ? 'Key + Passphrase' : 'Private Key';
                const ssl = sslMap[s.id];
                const assignment = assignmentMap[s.id];
                const displayDomain = s.assignedDomain || assignment?.hostname || null;
                const sslColors = { ACTIVE: 'badge-active', FAILED: 'badge-error', PROVISIONING: 'badge-soon', EXPIRED: 'badge-warning', PENDING: 'badge-soon', REMOVING: 'badge-soon' };
                let sslCell;
                if (ssl) {
                    sslCell = `<span class="badge ${sslColors[ssl.status] || 'badge-soon'}">${ssl.status}</span>`;
                    if (ssl.status === 'ACTIVE') {
                        sslCell += ` <button class="btn btn-ghost btn-sm" onclick="renewSsl('${ssl.id}', this)">Renew</button>`;
                    } else if (ssl.status === 'PROVISIONING' && ssl.provisioningJobId) {
                        sslCell += ` <button class="btn btn-ghost btn-sm" onclick="showJobLog('${ssl.provisioningJobId}')">View Log</button>`;
                    } else if (ssl.status === 'FAILED') {
                        if (ssl.provisioningJobId) {
                            sslCell += ` <button class="btn btn-ghost btn-sm" onclick="showJobLog('${ssl.provisioningJobId}')">View Log</button>`;
                        }
                        if (assignment) {
                            sslCell += ` <button class="btn btn-ghost btn-sm" onclick="provisionSsl('${assignment.id}', this)">Retry</button>`;
                        }
                        if (ssl.lastError) sslCell += `<div class="text-muted" style="font-size:10px;max-width:220px;white-space:normal;margin-top:2px;">${esc(ssl.lastError.substring(0, 100))}${ssl.lastError.length > 100 ? '...' : ''}</div>`;
                    }
                } else if (assignment) {
                    sslCell = `<button class="btn btn-ghost btn-sm" onclick="provisionSsl('${assignment.id}', this)">Provision SSL</button>`;
                } else if (s.sslEnabled) {
                    sslCell = `<span class="badge badge-active">ACTIVE</span><div class="text-muted" style="font-size:10px;margin-top:2px;">Detected on server</div>`;
                } else if (displayDomain) {
                    sslCell = '<span class="text-muted">External domain</span>';
                } else {
                    sslCell = '<span class="text-muted">No domain</span>';
                }
                return `
                <tr>
                    <td><strong>${esc(s.name)}</strong></td>
                    <td><span class="text-sm" style="font-family:var(--mono);">${esc(s.hostname || s.ipAddress)}</span></td>
                    <td>${displayDomain ? '<span class="text-sm" style="font-family:var(--mono);">' + esc(displayDomain) + '</span>' : '<span class="text-muted">—</span>'}</td>
                    <td>${s.sshPort}</td>
                    <td><span class="badge">${esc(s.environment)}</span></td>
                    <td class="text-sm">${authLabel}</td>
                    <td><span class="badge ${statusColors[s.status] || 'badge-soon'}">${s.status}</span></td>
                    <td style="white-space:nowrap;">${sslCell}</td>
                    <td style="white-space:nowrap;">
                        <button class="btn btn-ghost btn-sm" onclick="testConnection('${s.id}', this)">Test</button>
                        <button class="btn btn-ghost btn-sm" onclick='showEditModal(${JSON.stringify(s).replace(/'/g,"&#39;")})'>Edit</button>
                        <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="confirmDelete('${s.id}','${esc(s.name)}')">Delete</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function renderPagination(data) {
            const el = document.getElementById('pagination');
            if (data.totalPages <= 1) { el.innerHTML = `<span>${data.totalElements} servers</span>`; return; }
            el.innerHTML = `
                <button class="btn btn-ghost btn-sm" ${data.first ? 'disabled' : ''} onclick="loadServers(${currentPage - 1})">Prev</button>
                <span>Page ${data.number + 1} of ${data.totalPages} (${data.totalElements} servers)</span>
                <button class="btn btn-ghost btn-sm" ${data.last ? 'disabled' : ''} onclick="loadServers(${currentPage + 1})">Next</button>
            `;
        }

        async function testConnection(id, btn) {
            const origText = btn.textContent;
            btn.textContent = 'Testing...';
            btn.disabled = true;
            try {
                const res = await apiFetch(`/servers/${id}/test-connection`, { method: 'POST' });
                if (!res.ok) { showError('Test connection failed'); return; }
                const data = await res.json();
                if (data.success) {
                    showSuccess(`Connection OK${data.latencyMs ? ' (' + data.latencyMs + 'ms)' : ''}`);
                } else {
                    showError(data.message || 'Connection failed');
                }
            } catch (err) {
                showError(err.message);
            } finally {
                btn.textContent = origText;
                btn.disabled = false;
            }
        }

        // ── SSL Provisioning with live log modal ──
        let activePollTimer = null;
        let activeJobId = null;

        async function provisionSsl(assignmentId, btn) {
            const origText = btn.textContent;
            btn.textContent = 'Starting...';
            btn.disabled = true;
            try {
                const res = await apiFetch('/ssl-certificates', {
                    method: 'POST',
                    body: JSON.stringify({ assignmentId })
                });
                if (!res.ok) {
                    const err = await res.json();
                    showError(err.message || 'SSL provisioning failed');
                    return;
                }
                const job = await res.json();
                openSslLog(job);
            } catch (err) {
                showError(err.message);
            } finally {
                btn.textContent = origText;
                btn.disabled = false;
            }
        }

        function openSslLog(job) {
            activeJobId = job.id;
            document.getElementById('sslLogTitle').textContent = 'SSL: ' + (job.hostname || 'Provisioning');
            document.getElementById('sslLogBox').textContent = job.logs || 'Starting provisioning...';
            document.getElementById('sslLogError').classList.add('hidden');
            document.getElementById('sslLogRetryBtn').style.display = 'none';
            updateSslLogStep(job);
            updateSslLogMeta(job);
            document.getElementById('sslLogModal').classList.add('show');
            startPolling(job.id);
        }

        function closeSslLog() {
            document.getElementById('sslLogModal').classList.remove('show');
            stopPolling();
            activeJobId = null;
            loadServers(currentPage);
        }

        function updateSslLogStep(job) {
            const el = document.getElementById('sslLogStep');
            const stepLabels = {
                PENDING_DNS: 'Creating DNS record',
                DNS_CREATED: 'Waiting for DNS propagation',
                DNS_PROPAGATED: 'DNS propagated',
                ISSUING_CERT: 'Running certbot',
                CERT_ISSUED: 'Certificate issued',
                DEPLOYING_CONFIG: 'Deploying nginx config',
                VERIFYING: 'Verifying HTTPS',
                COMPLETED: 'Completed',
                FAILED_RETRYABLE: 'Failed (retryable)',
                FAILED_PERMANENT: 'Failed (permanent)'
            };
            el.textContent = stepLabels[job.currentStep] || job.currentStep;
            el.className = 'job-step ' + (
                job.status === 'COMPLETED' ? 'completed' :
                job.status === 'FAILED' ? 'failed' : 'running'
            );
        }

        function updateSslLogMeta(job) {
            const parts = [];
            parts.push('Job: ' + job.id.substring(0, 8));
            if (job.retryCount > 0) parts.push('Retry #' + job.retryCount);
            if (job.startedAt) parts.push('Started: ' + new Date(job.startedAt).toLocaleTimeString());
            if (job.finishedAt) {
                const dur = Math.round((new Date(job.finishedAt) - new Date(job.startedAt)) / 1000);
                parts.push('Duration: ' + dur + 's');
            }
            document.getElementById('sslLogMeta').innerHTML = parts.map(p => '<span>' + p + '</span>').join('');
        }

        function startPolling(jobId) {
            stopPolling();
            const poll = async () => {
                if (activeJobId !== jobId) return;
                try {
                    const res = await apiFetch(`/ssl-certificates/jobs/${jobId}`);
                    if (!res.ok) return;
                    const job = await res.json();

                    // Update log box
                    const logBox = document.getElementById('sslLogBox');
                    logBox.textContent = job.logs || 'Waiting for logs...';
                    logBox.scrollTop = logBox.scrollHeight;

                    updateSslLogStep(job);
                    updateSslLogMeta(job);

                    if (job.status === 'COMPLETED') {
                        showSuccess('SSL provisioned for ' + job.hostname);
                        return;
                    }
                    if (job.status === 'FAILED') {
                        const errEl = document.getElementById('sslLogError');
                        errEl.textContent = job.errorMessage || 'Unknown error';
                        errEl.classList.remove('hidden');
                        if (job.currentStep === 'FAILED_RETRYABLE') {
                            document.getElementById('sslLogRetryBtn').style.display = '';
                        }
                        return;
                    }
                    // Still running — poll again
                    activePollTimer = setTimeout(poll, 2000);
                } catch (e) {
                    activePollTimer = setTimeout(poll, 3000);
                }
            };
            // Poll immediately, then every 2 seconds
            poll();
        }

        function stopPolling() {
            if (activePollTimer) { clearTimeout(activePollTimer); activePollTimer = null; }
        }

        async function retrySslJob() {
            if (!activeJobId) return;
            document.getElementById('sslLogRetryBtn').style.display = 'none';
            document.getElementById('sslLogError').classList.add('hidden');
            document.getElementById('sslLogBox').textContent += '\n--- Retrying ---\n';
            try {
                const res = await apiFetch(`/ssl-certificates/jobs/${activeJobId}/retry`, { method: 'POST' });
                if (!res.ok) {
                    const err = await res.json();
                    showError(err.message || 'Retry failed');
                    return;
                }
                const job = await res.json();
                updateSslLogStep(job);
                updateSslLogMeta(job);
                startPolling(job.id);
            } catch (err) {
                showError(err.message);
            }
        }

        // Show log for an existing job (click on PROVISIONING badge)
        async function showJobLog(jobId) {
            try {
                const res = await apiFetch(`/ssl-certificates/jobs/${jobId}`);
                if (!res.ok) { showError('Failed to load job'); return; }
                const job = await res.json();
                openSslLog(job);
            } catch (err) { showError(err.message); }
        }

        async function renewSsl(certId, btn) {
            const origText = btn.textContent;
            btn.textContent = 'Renewing...';
            btn.disabled = true;
            try {
                const res = await apiFetch(`/ssl-certificates/${certId}/renew`, { method: 'POST' });
                if (!res.ok) {
                    const err = await res.json();
                    showError(err.message || 'SSL renewal failed');
                    return;
                }
                showSuccess('SSL certificate renewed');
                loadServers(currentPage);
            } catch (err) {
                showError(err.message);
            } finally {
                btn.textContent = origText;
                btn.disabled = false;
            }
        }

        async function confirmDelete(id, name) {
            if (!confirm(`Delete server "${name}"? This cannot be undone.`)) return;
            const res = await apiFetch(`/servers/${id}`, { method: 'DELETE' });
            if (!res.ok && res.status !== 204) { showError('Failed to delete server'); return; }
            loadServers(currentPage);
            showSuccess('Server deleted');
        }

        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        loadServers();
    </script>
</body>
</html>
