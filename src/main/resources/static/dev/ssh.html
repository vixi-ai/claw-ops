<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH Terminal - OpenClaw Control Plane</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .ssh-layout { display: grid; grid-template-columns: 260px 1fr; gap: 0; height: calc(100vh - 80px); }
        .ssh-layout.files-open { grid-template-columns: 260px 1fr 300px; }
        @media (max-width: 768px) { .ssh-layout, .ssh-layout.files-open { grid-template-columns: 1fr; height: auto; } }

        /* Sidebar */
        .sidebar {
            background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-header {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            font-size: 13px; font-weight: 600; color: var(--text);
        }
        .server-list { flex: 1; overflow-y: auto; }
        .server-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background 0.1s;
        }
        .server-item:hover { background: var(--surface-hover); }
        .server-item.selected { background: var(--surface-hover); border-left: 3px solid var(--primary); padding-left: 13px; }
        .server-item-info { min-width: 0; }
        .server-item-name { font-size: 13px; font-weight: 500; }
        .server-item-host { font-size: 11px; color: var(--text-muted); font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .server-item-status { font-size: 10px; padding: 2px 6px; border-radius: 8px; flex-shrink: 0; }

        /* Main area */
        .term-main { display: flex; flex-direction: column; overflow: hidden; }

        /* Top bar */
        .term-topbar {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 16px; border-bottom: 1px solid var(--border);
            background: var(--surface); min-height: 44px;
        }
        .term-topbar-server { font-size: 13px; font-weight: 600; }
        .term-topbar-host { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
        .terminal-status {
            font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .terminal-status.disconnected { background: #374151; color: #9ca3af; }
        .terminal-status.connecting { background: #fef3c7; color: #92400e; }
        .terminal-status.connected { background: #d1fae5; color: #065f46; }

        /* Terminal display */
        .term-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #0d1117; }
        #terminalDisplay {
            flex: 1; overflow-y: auto; padding: 12px 16px;
            font-family: 'Cascadia Code', 'Cascadia Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
            font-size: 13px; line-height: 1.5; color: #c9d1d9;
            white-space: pre-wrap; word-break: break-all;
            outline: none; cursor: text;
            -webkit-user-select: text; user-select: text;
        }
        #terminalDisplay::selection { background: #264f78; color: #fff; }
        #terminalDisplay::-moz-selection { background: #264f78; color: #fff; }

        /* Placeholder state */
        .term-placeholder {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #484f58; font-size: 14px; gap: 8px; background: #0d1117;
        }
        .term-placeholder-icon { font-size: 48px; opacity: 0.3; }

        /* Bottom bar */
        .term-bottombar {
            display: flex; align-items: center; gap: 12px;
            padding: 6px 16px; border-top: 1px solid #21262d;
            background: #161b22; font-size: 11px; color: #484f58;
        }
        .term-bottombar kbd {
            background: #21262d; border: 1px solid #30363d; border-radius: 3px;
            padding: 1px 4px; font-family: inherit; font-size: 10px; color: #8b949e;
        }

        /* File browser panel */
        .file-panel {
            background: var(--surface); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .file-panel-header {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px; border-bottom: 1px solid var(--border);
            min-height: 44px;
        }
        .file-panel-header span { font-size: 13px; font-weight: 600; }
        .file-panel-close {
            margin-left: auto; background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px;
        }
        .file-panel-close:hover { background: var(--surface-hover); color: var(--text); }

        .file-breadcrumb {
            display: flex; align-items: center; gap: 2px; flex-wrap: wrap;
            padding: 6px 12px; border-bottom: 1px solid var(--border);
            font-size: 11px; font-family: var(--mono); color: var(--text-muted);
            background: var(--bg); min-height: 30px;
        }
        .file-breadcrumb-seg {
            background: none; border: none; color: var(--primary); cursor: pointer;
            font-family: var(--mono); font-size: 11px; padding: 1px 3px; border-radius: 3px;
        }
        .file-breadcrumb-seg:hover { background: var(--surface-hover); }
        .file-breadcrumb-sep { color: var(--text-muted); opacity: 0.4; }

        .file-list { flex: 1; overflow-y: auto; }
        .file-list-loading { padding: 24px; text-align: center; color: var(--text-muted); font-size: 12px; }

        .file-item {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 12px; cursor: pointer; transition: background 0.1s;
            border-bottom: 1px solid rgba(46, 51, 69, 0.4);
            font-size: 13px;
        }
        .file-item:hover { background: var(--surface-hover); }
        .file-item-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; opacity: 0.7; }
        .file-item-icon.dir { color: var(--primary); }
        .file-item-icon.file { color: var(--text-muted); }
        .file-item-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-item-name.dir { color: var(--text); font-weight: 500; }
        .file-item-name.file { color: var(--text-muted); }
        .file-item-size { font-size: 11px; color: var(--text-muted); font-family: var(--mono); flex-shrink: 0; }
        .file-item-parent { color: var(--text-muted); font-style: italic; }
        .file-item-download {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            font-size: 13px; padding: 2px 4px; border-radius: 3px; flex-shrink: 0;
            opacity: 0; transition: opacity 0.1s;
        }
        .file-item:hover .file-item-download { opacity: 1; }
        .file-item-download:hover { background: var(--surface-hover); color: var(--primary); }

        .file-actions {
            display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid var(--border);
            background: var(--surface); font-size: 11px;
        }
        .file-actions button {
            background: none; border: 1px solid var(--border); color: var(--text-muted);
            padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: var(--font);
        }
        .file-actions button:hover { background: var(--surface-hover); color: var(--text); }

        /* Drag-and-drop upload */
        .file-list.drag-over {
            background: rgba(88, 166, 255, 0.08);
            border: 2px dashed var(--primary);
            border-radius: 4px;
        }
        .upload-status {
            padding: 6px 12px; font-size: 11px; color: var(--text-muted);
            border-top: 1px solid var(--border); background: var(--surface);
            display: none; align-items: center; gap: 8px;
        }
        .upload-status.visible { display: flex; }
        .upload-status .upload-spinner {
            width: 12px; height: 12px; border: 2px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .upload-status.success { color: #7ee787; }
        .upload-status.error { color: #ff7b72; }
    </style>
</head>
<body>
    <script src="common.js"></script>
    <script>requireAuth();</script>

    <div id="header"></div>

    <div class="ssh-layout" id="sshLayout">
        <!-- Sidebar: Server list -->
        <div class="sidebar">
            <div class="sidebar-header">Servers</div>
            <div id="serverList" class="server-list">
                <div style="padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px;">Loading...</div>
            </div>
        </div>

        <!-- Main: Terminal -->
        <div class="term-main">
            <div class="term-topbar">
                <span id="termServerName" class="term-topbar-server" style="color: var(--text-muted);">No server selected</span>
                <span id="termServerHost" class="term-topbar-host"></span>
                <span style="flex:1;"></span>
                <span id="termStatus" class="terminal-status disconnected">Disconnected</span>
                <button class="btn btn-ghost btn-sm" id="filesToggleBtn" onclick="toggleFilePanel()" style="display:none;">Files</button>
                <button class="btn btn-primary btn-sm" id="termConnectBtn" onclick="termConnect()" disabled>Connect</button>
                <button class="btn btn-ghost btn-sm" id="termDisconnectBtn" onclick="termDisconnect()" style="display:none;">Disconnect</button>
            </div>

            <div class="term-wrapper">
                <div id="termPlaceholder" class="term-placeholder">
                    <div class="term-placeholder-icon">></div>
                    <div>Select a server and click Connect</div>
                </div>
                <div id="terminalDisplay" tabindex="0" style="display:none;"></div>
            </div>

            <div class="term-bottombar">
                <span>Select text + <kbd>Ctrl+C</kbd> to copy</span>
                <span>|</span>
                <span>Right-click to paste</span>
                <span>|</span>
                <span><kbd>Ctrl+C</kbd> (no selection) sends SIGINT</span>
            </div>
        </div>

        <!-- File Browser Panel (hidden by default) -->
        <div class="file-panel" id="filePanel" style="display:none;">
            <div class="file-panel-header">
                <span>File Browser</span>
                <button class="file-panel-close" onclick="toggleFilePanel()" title="Close">&times;</button>
            </div>
            <div class="file-breadcrumb" id="fileBreadcrumb">/</div>
            <div class="file-list" id="fileList">
                <div class="file-list-loading">Select a server to browse files</div>
            </div>
            <div class="upload-status" id="uploadStatus">
                <div class="upload-spinner"></div>
                <span id="uploadStatusText">Uploading...</span>
            </div>
            <div class="file-actions">
                <button onclick="refreshFiles()">Refresh</button>
                <button onclick="goHome()">Home (~)</button>
                <button onclick="navigateTo('/')">Root (/)</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('header').innerHTML = headerHTML('SSH Terminal');

        let selectedServerId = null;
        let selectedServer = null;
        let servers = [];

        // ── ANSI Parser ────────────────────────────────
        const ANSI_COLORS = {
            30: '#484f58', 31: '#ff7b72', 32: '#7ee787', 33: '#d29922',
            34: '#79c0ff', 35: '#d2a8ff', 36: '#a5d6ff', 37: '#c9d1d9',
            90: '#6e7681', 91: '#ffa198', 92: '#56d364', 93: '#e3b341',
            94: '#79c0ff', 95: '#d2a8ff', 96: '#a5d6ff', 97: '#f0f6fc'
        };
        const ANSI_BG_COLORS = {
            40: '#484f58', 41: '#ff7b72', 42: '#7ee787', 43: '#d29922',
            44: '#79c0ff', 45: '#d2a8ff', 46: '#a5d6ff', 47: '#c9d1d9',
            100: '#6e7681', 101: '#ffa198', 102: '#56d364', 103: '#e3b341',
            104: '#79c0ff', 105: '#d2a8ff', 106: '#a5d6ff', 107: '#f0f6fc'
        };

        function ansiToHtml(text) {
            text = text.replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '');
            text = text.replace(/\x1b\[\?[0-9;]*[hl]/g, '');
            text = text.replace(/\x1b\[[0-9;]*[ABCDJKHG]/g, '');
            text = text.replace(/\x1b\[[0-9;]*[mK]/g, function(match) {
                if (match.endsWith('K')) return '';
                return match;
            });

            let result = '';
            let bold = false, dim = false, italic = false, underline = false;
            let fg = null, bg = null;
            let i = 0;
            let spanOpen = false;

            function openSpan() {
                let styles = [];
                if (bold) styles.push('font-weight:bold');
                if (dim) styles.push('opacity:0.6');
                if (italic) styles.push('font-style:italic');
                if (underline) styles.push('text-decoration:underline');
                if (fg) styles.push('color:' + fg);
                if (bg) styles.push('background:' + bg);
                if (styles.length) {
                    result += '<span style="' + styles.join(';') + '">';
                    spanOpen = true;
                }
            }

            function closeSpan() {
                if (spanOpen) { result += '</span>'; spanOpen = false; }
            }

            while (i < text.length) {
                if (text[i] === '\x1b' && text[i + 1] === '[') {
                    let j = i + 2;
                    while (j < text.length && text[j] !== 'm' && j - i < 20) j++;
                    if (j < text.length && text[j] === 'm') {
                        closeSpan();
                        const params = text.substring(i + 2, j).split(';').map(Number);
                        for (let p = 0; p < params.length; p++) {
                            const code = params[p] || 0;
                            if (code === 0) { bold = dim = italic = underline = false; fg = bg = null; }
                            else if (code === 1) bold = true;
                            else if (code === 2) dim = true;
                            else if (code === 3) italic = true;
                            else if (code === 4) underline = true;
                            else if (code === 22) { bold = false; dim = false; }
                            else if (code === 23) italic = false;
                            else if (code === 24) underline = false;
                            else if (code === 39) fg = null;
                            else if (code === 49) bg = null;
                            else if (ANSI_COLORS[code]) fg = ANSI_COLORS[code];
                            else if (ANSI_BG_COLORS[code]) bg = ANSI_BG_COLORS[code];
                            else if (code === 38 && params[p + 1] === 5) { p += 2; }
                            else if (code === 48 && params[p + 1] === 5) { p += 2; }
                        }
                        openSpan();
                        i = j + 1;
                        continue;
                    }
                }
                if (text[i] === '\x1b') { i++; continue; }
                if (text[i] === '\r') { i++; continue; }
                if (text[i] === '<') result += '&lt;';
                else if (text[i] === '>') result += '&gt;';
                else if (text[i] === '&') result += '&amp;';
                else result += text[i];
                i++;
            }
            closeSpan();
            return result;
        }

        // ── Server loading ─────────────────────────────
        async function loadServers() {
            const res = await apiFetch('/servers?page=0&size=100&sort=name,asc');
            if (!res.ok) { showError('Failed to load servers'); return; }
            const data = await res.json();
            servers = data.content;
            renderServerList();
        }

        function renderServerList() {
            const el = document.getElementById('serverList');
            if (!servers.length) {
                el.innerHTML = '<div style="padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px;">No servers registered</div>';
                return;
            }
            el.innerHTML = servers.map(s => {
                const statusClass = s.status === 'ONLINE' ? 'badge-active' : s.status === 'OFFLINE' ? 'badge-error' : 'badge-soon';
                return `<div class="server-item ${s.id === selectedServerId ? 'selected' : ''}" onclick="selectServer('${s.id}')">
                    <div class="server-item-info">
                        <div class="server-item-name">${esc(s.name)}</div>
                        <div class="server-item-host">${esc(s.hostname || s.ipAddress)}</div>
                    </div>
                    <span class="server-item-status badge ${statusClass}">${s.status}</span>
                </div>`;
            }).join('');
        }

        function selectServer(id) {
            if (termConnected && selectedServerId !== id) {
                termDisconnect();
            }
            selectedServerId = id;
            selectedServer = servers.find(x => x.id === id);
            renderServerList();

            document.getElementById('termServerName').textContent = selectedServer ? selectedServer.name : 'No server selected';
            document.getElementById('termServerName').style.color = '';
            document.getElementById('termServerHost').textContent = selectedServer ? (selectedServer.hostname || selectedServer.ipAddress) : '';
            document.getElementById('termConnectBtn').disabled = false;
            document.getElementById('filesToggleBtn').style.display = '';

            // Reset file browser when switching servers
            currentFilePath = '~';
            if (filePanelOpen) {
                loadFiles('~');
            }
        }

        // ── Terminal ───────────────────────────────────
        let ws = null;
        let termConnected = false;

        function setTermStatus(status) {
            const el = document.getElementById('termStatus');
            el.className = 'terminal-status ' + status;
            const labels = { disconnected: 'Disconnected', connecting: 'Connecting...', connected: 'Connected' };
            el.textContent = labels[status] || status;
        }

        function termWrite(html) {
            const termEl = document.getElementById('terminalDisplay');
            termEl.innerHTML += html;
            termEl.scrollTop = termEl.scrollHeight;
        }

        async function termConnect() {
            if (!selectedServerId) { showError('Select a server first'); return; }
            if (termConnected) return;

            setTermStatus('connecting');
            document.getElementById('termConnectBtn').disabled = true;

            const termEl = document.getElementById('terminalDisplay');
            const placeholder = document.getElementById('termPlaceholder');
            placeholder.style.display = 'none';
            termEl.style.display = '';
            termEl.innerHTML = '';
            termEl.focus();

            try {
                const res = await apiFetch(`/servers/${selectedServerId}/ssh/session-token`);
                if (!res.ok) {
                    const err = await res.json();
                    showError(err.message || 'Failed to get session token');
                    setTermStatus('disconnected');
                    document.getElementById('termConnectBtn').disabled = false;
                    return;
                }
                const { token } = await res.json();

                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${location.host}/ws/terminal?token=${token}&cols=120&rows=40`;
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    termConnected = true;
                    setTermStatus('connected');
                    document.getElementById('termConnectBtn').style.display = 'none';
                    document.getElementById('termDisconnectBtn').style.display = '';
                    termEl.focus();
                };

                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'OUTPUT') {
                        termWrite(ansiToHtml(msg.data));
                    } else if (msg.type === 'ERROR') {
                        termWrite('<span style="color:#ff7b72">[ERROR] ' + esc(msg.data) + '</span>\n');
                    } else if (msg.type === 'CLOSED') {
                        termWrite('<span style="color:#6e7681">\n--- Session ended ---\n</span>');
                        termCleanup();
                    }
                };

                ws.onclose = () => {
                    if (termConnected) {
                        termWrite('<span style="color:#6e7681">\n--- Connection closed ---\n</span>');
                    }
                    termCleanup();
                };

                ws.onerror = () => {
                    termWrite('<span style="color:#ff7b72">\n--- Connection error ---\n</span>');
                    termCleanup();
                };

            } catch (err) {
                showError(err.message);
                setTermStatus('disconnected');
                document.getElementById('termConnectBtn').disabled = false;
            }
        }

        function termDisconnect() {
            if (ws) ws.close();
            termCleanup();
        }

        function termCleanup() {
            termConnected = false;
            ws = null;
            setTermStatus('disconnected');
            document.getElementById('termConnectBtn').style.display = '';
            document.getElementById('termConnectBtn').disabled = !selectedServerId;
            document.getElementById('termDisconnectBtn').style.display = 'none';
        }

        // ── Keyboard ──────────────────────────────────
        document.getElementById('terminalDisplay').addEventListener('keydown', (e) => {
            if (!termConnected || !ws) return;

            if (e.ctrlKey && e.key === 'c') {
                const selection = window.getSelection().toString();
                if (selection) {
                    document.execCommand('copy');
                    window.getSelection().removeAllRanges();
                    return;
                }
                e.preventDefault();
                ws.send(JSON.stringify({ type: 'INPUT', data: '\x03' }));
                return;
            }

            if (e.ctrlKey && e.key === 'v') return;

            e.preventDefault();

            let data = '';
            if (e.ctrlKey && e.key === 'd') { data = '\x04'; }
            else if (e.ctrlKey && e.key === 'l') { data = '\x0c'; }
            else if (e.ctrlKey && e.key === 'z') { data = '\x1a'; }
            else if (e.ctrlKey && e.key === 'a') { data = '\x01'; }
            else if (e.ctrlKey && e.key === 'e') { data = '\x05'; }
            else if (e.ctrlKey && e.key === 'u') { data = '\x15'; }
            else if (e.ctrlKey && e.key === 'k') { data = '\x0b'; }
            else if (e.ctrlKey && e.key === 'w') { data = '\x17'; }
            else if (e.key === 'Enter') { data = '\r'; }
            else if (e.key === 'Backspace') { data = '\x7f'; }
            else if (e.key === 'Tab') { data = '\t'; }
            else if (e.key === 'Escape') { data = '\x1b'; }
            else if (e.key === 'ArrowUp') { data = '\x1b[A'; }
            else if (e.key === 'ArrowDown') { data = '\x1b[B'; }
            else if (e.key === 'ArrowRight') { data = '\x1b[C'; }
            else if (e.key === 'ArrowLeft') { data = '\x1b[D'; }
            else if (e.key === 'Home') { data = '\x1b[H'; }
            else if (e.key === 'End') { data = '\x1b[F'; }
            else if (e.key === 'Delete') { data = '\x1b[3~'; }
            else if (e.key === 'PageUp') { data = '\x1b[5~'; }
            else if (e.key === 'PageDown') { data = '\x1b[6~'; }
            else if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) { data = e.key; }

            if (data) {
                ws.send(JSON.stringify({ type: 'INPUT', data: data }));
            }
        });

        document.getElementById('terminalDisplay').addEventListener('paste', (e) => {
            if (!termConnected || !ws) return;
            e.preventDefault();
            const text = e.clipboardData.getData('text');
            if (text) {
                ws.send(JSON.stringify({ type: 'INPUT', data: text }));
            }
        });

        document.getElementById('terminalDisplay').addEventListener('contextmenu', (e) => {
            if (!termConnected || !ws) return;
            e.preventDefault();
            navigator.clipboard.readText().then(text => {
                if (text) {
                    ws.send(JSON.stringify({ type: 'INPUT', data: text }));
                }
            }).catch(() => {});
        });

        window.addEventListener('beforeunload', () => {
            if (ws) ws.close();
        });

        // ── File Browser ──────────────────────────────
        let filePanelOpen = false;
        let currentFilePath = '~';

        function toggleFilePanel() {
            filePanelOpen = !filePanelOpen;
            const layout = document.getElementById('sshLayout');
            const panel = document.getElementById('filePanel');
            const btn = document.getElementById('filesToggleBtn');

            if (filePanelOpen) {
                layout.classList.add('files-open');
                panel.style.display = '';
                btn.classList.remove('btn-ghost');
                btn.classList.add('btn-primary');
                if (selectedServerId) loadFiles(currentFilePath);
            } else {
                layout.classList.remove('files-open');
                panel.style.display = 'none';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-ghost');
            }
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' K';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' M';
            return (bytes / 1073741824).toFixed(1) + ' G';
        }

        function fileIcon(name, isDir) {
            if (isDir) return '\u{1F4C1}';
            const ext = name.split('.').pop().toLowerCase();
            if (['sh', 'bash'].includes(ext)) return '\u{1F4DC}';
            if (['conf', 'cfg', 'ini', 'yaml', 'yml', 'json', 'toml', 'xml', 'env'].includes(ext)) return '\u{2699}';
            if (['log', 'txt', 'md', 'rst'].includes(ext)) return '\u{1F4C4}';
            if (['tar', 'gz', 'zip', 'bz2', 'xz', 'deb', 'rpm'].includes(ext)) return '\u{1F4E6}';
            if (['key', 'pem', 'crt', 'cert'].includes(ext)) return '\u{1F512}';
            return '\u{1F4C4}';
        }

        function renderBreadcrumb(path) {
            const el = document.getElementById('fileBreadcrumb');
            if (path === '~' || path === '') {
                el.innerHTML = '<button class="file-breadcrumb-seg" onclick="navigateTo(\'~\')">~</button>';
                return;
            }
            const parts = path.split('/').filter(Boolean);
            let html = '<button class="file-breadcrumb-seg" onclick="navigateTo(\'/\')">/</button>';
            let accumulated = '';
            for (let i = 0; i < parts.length; i++) {
                accumulated += '/' + parts[i];
                const p = accumulated;
                html += `<span class="file-breadcrumb-sep">/</span>`;
                html += `<button class="file-breadcrumb-seg" onclick="navigateTo('${esc(p)}')">${esc(parts[i])}</button>`;
            }
            el.innerHTML = html;
        }

        async function loadFiles(path) {
            if (!selectedServerId) return;
            currentFilePath = path;
            renderBreadcrumb(path);

            const listEl = document.getElementById('fileList');
            listEl.innerHTML = '<div class="file-list-loading">Loading...</div>';

            try {
                const encodedPath = encodeURIComponent(path);
                const res = await apiFetch(`/servers/${selectedServerId}/sftp/ls?path=${encodedPath}`);
                if (!res.ok) {
                    const err = await res.json();
                    listEl.innerHTML = `<div class="file-list-loading" style="color:var(--danger);">${esc(err.message || 'Failed to list directory')}</div>`;
                    return;
                }
                const files = await res.json();

                let html = '';

                // Parent directory link
                if (path !== '/' && path !== '~') {
                    const parent = path.substring(0, path.lastIndexOf('/')) || '/';
                    html += `<div class="file-item" onclick="navigateTo('${esc(parent)}')">
                        <span class="file-item-icon dir">\u{2B06}</span>
                        <span class="file-item-name file-item-parent">..</span>
                        <span class="file-item-size"></span>
                    </div>`;
                }

                if (files.length === 0) {
                    html += '<div class="file-list-loading">Empty directory</div>';
                } else {
                    for (const f of files) {
                        if (f.name === '.' || f.name === '..') continue;
                        const icon = fileIcon(f.name, f.directory);
                        const typeClass = f.directory ? 'dir' : 'file';
                        const size = f.directory ? '' : formatSize(f.size);
                        const onclick = f.directory
                            ? `onclick="navigateTo('${esc(f.path)}')"`
                            : `onclick="cdToFile('${esc(f.path)}')"`;
                        const downloadBtn = f.directory ? ''
                            : `<button class="file-item-download" onclick="event.stopPropagation(); downloadFile('${esc(f.path)}')" title="Download">\u{2B07}</button>`;
                        html += `<div class="file-item" ${onclick}>
                            <span class="file-item-icon ${typeClass}">${icon}</span>
                            <span class="file-item-name ${typeClass}">${esc(f.name)}</span>
                            <span class="file-item-size">${size}</span>
                            ${downloadBtn}
                        </div>`;
                    }
                }

                listEl.innerHTML = html;
            } catch (e) {
                listEl.innerHTML = `<div class="file-list-loading" style="color:var(--danger);">${esc(e.message)}</div>`;
            }
        }

        function navigateTo(path) {
            loadFiles(path);
        }

        function refreshFiles() {
            loadFiles(currentFilePath);
        }

        function goHome() {
            loadFiles('~');
        }

        // Click on a file: cd to its directory in the terminal and optionally cat it
        function cdToFile(filePath) {
            if (!termConnected || !ws) return;
            const dir = filePath.substring(0, filePath.lastIndexOf('/')) || '/';
            const name = filePath.substring(filePath.lastIndexOf('/') + 1);
            // Send cd + ls to the terminal
            ws.send(JSON.stringify({ type: 'INPUT', data: `cd ${dir} && ls -la ${name}\r` }));
            document.getElementById('terminalDisplay').focus();
        }

        function downloadFile(remotePath) {
            if (!selectedServerId) return;
            const encodedPath = encodeURIComponent(remotePath);
            const token = getToken();
            const url = `${API_BASE}/servers/${selectedServerId}/sftp/download?path=${encodedPath}`;
            fetch(url, { headers: token ? { 'Authorization': `Bearer ${token}` } : {} })
                .then(res => {
                    if (!res.ok) return res.json().then(err => { throw new Error(err.message || 'Download failed'); });
                    return res.blob();
                })
                .then(blob => {
                    const name = remotePath.substring(remotePath.lastIndexOf('/') + 1);
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = name;
                    a.click();
                    URL.revokeObjectURL(a.href);
                })
                .catch(err => showError(err.message));
        }

        // ── File Upload (Drag & Drop) ─────────────────
        const fileListEl = document.getElementById('fileList');
        let dragCounter = 0;

        fileListEl.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            fileListEl.classList.add('drag-over');
        });

        fileListEl.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        fileListEl.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter <= 0) {
                dragCounter = 0;
                fileListEl.classList.remove('drag-over');
            }
        });

        fileListEl.addEventListener('drop', async (e) => {
            e.preventDefault();
            dragCounter = 0;
            fileListEl.classList.remove('drag-over');

            if (!selectedServerId) { showError('Select a server first'); return; }
            const files = e.dataTransfer.files;
            if (!files.length) return;

            const statusEl = document.getElementById('uploadStatus');
            const statusText = document.getElementById('uploadStatusText');
            statusEl.className = 'upload-status visible';
            statusText.textContent = `Uploading ${files.length} file${files.length > 1 ? 's' : ''}...`;

            let uploaded = 0, failed = 0;
            for (const file of files) {
                try {
                    const form = new FormData();
                    form.append('file', file);
                    const encodedPath = encodeURIComponent(currentFilePath);
                    const token = getToken();
                    const res = await fetch(`${API_BASE}/servers/${selectedServerId}/sftp/upload?path=${encodedPath}`, {
                        method: 'POST',
                        headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                        body: form
                    });
                    if (res.ok) { uploaded++; }
                    else {
                        failed++;
                        const err = await res.json();
                        console.error('Upload failed:', file.name, err.message);
                    }
                } catch (err) {
                    failed++;
                    console.error('Upload error:', file.name, err);
                }
            }

            if (failed === 0) {
                statusEl.className = 'upload-status visible success';
                statusText.textContent = `Uploaded ${uploaded} file${uploaded > 1 ? 's' : ''}`;
            } else {
                statusEl.className = 'upload-status visible error';
                statusText.textContent = `${uploaded} uploaded, ${failed} failed`;
            }
            setTimeout(() => { statusEl.className = 'upload-status'; }, 3000);
            refreshFiles();
        });

        // ── Utils ──────────────────────────────────────
        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        loadServers();
    </script>
</body>
</html>
