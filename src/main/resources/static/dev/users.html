<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - OpenClaw Control Plane</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .role-employee { color: var(--success); }
    </style>
</head>
<body>
    <script src="common.js"></script>
    <script>requireAuth();</script>

    <div id="header"></div>
    <div class="container">
        <div id="alert" class="alert"></div>

        <div class="flex-between mb-16">
            <h2>User Management</h2>
            <button class="btn btn-primary" onclick="openCreateModal()">+ Create User</button>
        </div>

        <div class="card" style="padding: 0; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    <tr><td colspan="6" class="text-muted" style="text-align:center; padding:32px;">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Create / Edit Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <h2 id="modalTitle">Create User</h2>
            <div id="modalAlert" class="alert"></div>
            <form id="userForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label for="formEmail">Email</label>
                    <input type="email" id="formEmail" required>
                </div>
                <div class="form-group">
                    <label for="formUsername">Username</label>
                    <input type="text" id="formUsername" required minlength="3" maxlength="50">
                </div>
                <div class="form-group" id="passwordGroup">
                    <label for="formPassword">Password</label>
                    <input type="password" id="formPassword" minlength="8">
                </div>
                <div class="form-group">
                    <label for="formRole">Role</label>
                    <select id="formRole">
                        <option value="DEVOPS">DEVOPS</option>
                        <option value="ADMIN">ADMIN</option>
                        <option value="EMPLOYEE">EMPLOYEE</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="modalSubmitBtn">Create</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal">
            <h2>Change Password</h2>
            <div id="pwdAlert" class="alert"></div>
            <form id="passwordForm">
                <input type="hidden" id="pwdUserId">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required minlength="8">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-ghost" onclick="closePasswordModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Server Access Modal -->
    <div class="modal-overlay" id="accessModal">
        <div class="modal" style="max-width:600px;">
            <h2>Server Access — <span id="accessUsername"></span></h2>
            <div id="accessAlert" class="alert"></div>
            <input type="hidden" id="accessUserId">

            <div id="currentAccessList" style="margin-bottom:16px;"></div>

            <div style="display:flex;gap:8px;align-items:flex-end;">
                <div class="form-group" style="flex:1;margin:0;">
                    <label>Add Server</label>
                    <select id="serverSelect"><option value="">Loading...</option></select>
                </div>
                <button class="btn btn-primary" onclick="addServerAccess()">Add</button>
            </div>

            <div class="modal-actions" style="margin-top:16px;">
                <button type="button" class="btn btn-ghost" onclick="closeAccessModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('header').innerHTML = headerHTML('Users');

        let currentPage = 0;
        const pageSize = 15;

        async function loadUsers(page = 0) {
            currentPage = page;
            const res = await apiFetch(`/users?page=${page}&size=${pageSize}&sort=createdAt,desc`);
            if (!res.ok) { showError('Failed to load users'); return; }
            const data = await res.json();
            renderTable(data.content);
            renderPagination(data);
        }

        function roleClass(role) {
            if (role === 'ADMIN') return 'role-admin';
            if (role === 'EMPLOYEE') return 'role-employee';
            return 'role-devops';
        }

        function renderTable(users) {
            const tbody = document.getElementById('usersTable');
            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="text-align:center;padding:32px;">No users found</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td><strong>${esc(u.username)}</strong></td>
                    <td>${esc(u.email)}</td>
                    <td><span class="${roleClass(u.role)}">${u.role}</span></td>
                    <td><span class="${u.enabled ? 'status-enabled' : 'status-disabled'}">${u.enabled ? 'Enabled' : 'Disabled'}</span></td>
                    <td class="text-muted text-sm">${formatDate(u.createdAt)}</td>
                    <td>
                        <div class="btn-group">
                            <button class="btn btn-ghost btn-sm" onclick="openEditModal('${u.id}','${esc(u.email)}','${esc(u.username)}','${u.role}',${u.enabled})">Edit</button>
                            <button class="btn btn-ghost btn-sm" onclick="openPasswordModal('${u.id}')">Password</button>
                            ${u.role === 'EMPLOYEE' ? `<button class="btn btn-ghost btn-sm" style="color:var(--success)" onclick="openAccessModal('${u.id}','${esc(u.username)}')">Server Access</button>` : ''}
                            <button class="btn btn-ghost btn-sm" onclick="toggleUser('${u.id}',${u.enabled})">${u.enabled ? 'Disable' : 'Enable'}</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}','${esc(u.username)}')">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderPagination(data) {
            const el = document.getElementById('pagination');
            if (data.totalPages <= 1) { el.innerHTML = ''; return; }
            el.innerHTML = `
                <button class="btn btn-ghost btn-sm" ${data.first ? 'disabled' : ''} onclick="loadUsers(${currentPage - 1})">Prev</button>
                <span>Page ${data.number + 1} of ${data.totalPages}</span>
                <button class="btn btn-ghost btn-sm" ${data.last ? 'disabled' : ''} onclick="loadUsers(${currentPage + 1})">Next</button>
            `;
        }

        // Create modal
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Create User';
            document.getElementById('modalSubmitBtn').textContent = 'Create';
            document.getElementById('editUserId').value = '';
            document.getElementById('formEmail').value = '';
            document.getElementById('formUsername').value = '';
            document.getElementById('formPassword').value = '';
            document.getElementById('formRole').value = 'DEVOPS';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('formPassword').required = true;
            hideAlert('modalAlert');
            document.getElementById('userModal').classList.add('show');
        }

        function openEditModal(id, email, username, role, enabled) {
            document.getElementById('modalTitle').textContent = 'Edit User';
            document.getElementById('modalSubmitBtn').textContent = 'Save';
            document.getElementById('editUserId').value = id;
            document.getElementById('formEmail').value = email;
            document.getElementById('formUsername').value = username;
            document.getElementById('formRole').value = role;
            document.getElementById('passwordGroup').style.display = 'none';
            document.getElementById('formPassword').required = false;
            hideAlert('modalAlert');
            document.getElementById('userModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('userModal').classList.remove('show');
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert('modalAlert');
            const userId = document.getElementById('editUserId').value;
            const email = document.getElementById('formEmail').value;
            const username = document.getElementById('formUsername').value;
            const password = document.getElementById('formPassword').value;
            const role = document.getElementById('formRole').value;

            let res;
            if (userId) {
                res = await apiFetch(`/users/${userId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ email, username, role })
                });
            } else {
                res = await apiFetch('/users', {
                    method: 'POST',
                    body: JSON.stringify({ email, username, password, role })
                });
            }

            if (!res.ok) {
                const err = await res.json();
                const msg = err.messages ? err.messages.map(m => `${m.field}: ${m.message}`).join(', ') : err.message;
                showAlert('modalAlert', msg || 'Operation failed', 'error');
                return;
            }

            closeModal();
            showSuccess(userId ? 'User updated' : 'User created');
            loadUsers(currentPage);
        });

        // Password modal
        function openPasswordModal(id) {
            document.getElementById('pwdUserId').value = id;
            document.getElementById('newPassword').value = '';
            hideAlert('pwdAlert');
            document.getElementById('passwordModal').classList.add('show');
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('show');
        }

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert('pwdAlert');
            const userId = document.getElementById('pwdUserId').value;
            const newPassword = document.getElementById('newPassword').value;

            const res = await apiFetch(`/users/${userId}/change-password`, {
                method: 'POST',
                body: JSON.stringify({ newPassword })
            });

            if (!res.ok) {
                const err = await res.json();
                const msg = err.messages ? err.messages.map(m => `${m.field}: ${m.message}`).join(', ') : err.message;
                showAlert('pwdAlert', msg || 'Failed to change password', 'error');
                return;
            }

            closePasswordModal();
            showSuccess('Password changed');
        });

        // Toggle enable/disable
        async function toggleUser(id, currentlyEnabled) {
            const res = await apiFetch(`/users/${id}`, {
                method: 'PATCH',
                body: JSON.stringify({ enabled: !currentlyEnabled })
            });
            if (!res.ok) { showError('Failed to update user'); return; }
            showSuccess(currentlyEnabled ? 'User disabled' : 'User enabled');
            loadUsers(currentPage);
        }

        // Delete
        async function deleteUser(id, username) {
            if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
            const res = await apiFetch(`/users/${id}`, { method: 'DELETE' });
            if (!res.ok) { showError('Failed to delete user'); return; }
            showSuccess('User deleted');
            loadUsers(currentPage);
        }

        // ══════════════════════════════════════
        //  SERVER ACCESS MODAL
        // ══════════════════════════════════════

        let allServers = [];

        async function openAccessModal(userId, username) {
            document.getElementById('accessUserId').value = userId;
            document.getElementById('accessUsername').textContent = username;
            hideAlert('accessAlert');
            document.getElementById('accessModal').classList.add('show');

            // Load servers and current access in parallel
            const [serversRes, accessRes] = await Promise.all([
                apiFetch('/servers?size=200&sort=name,asc'),
                apiFetch(`/users/${userId}/server-access`)
            ]);

            if (serversRes.ok) {
                const data = await serversRes.json();
                allServers = data.content || [];
            }

            if (accessRes.ok) {
                const access = await accessRes.json();
                renderCurrentAccess(access);
                renderServerDropdown(access);
            }
        }

        function closeAccessModal() {
            document.getElementById('accessModal').classList.remove('show');
        }

        function renderCurrentAccess(accessList) {
            const el = document.getElementById('currentAccessList');
            if (!accessList.length) {
                el.innerHTML = '<p class="text-muted text-sm">No servers assigned yet.</p>';
                return;
            }
            el.innerHTML = `
                <table style="width:100%;font-size:13px;">
                    <thead><tr><th>Server</th><th>Assigned</th><th></th></tr></thead>
                    <tbody>
                        ${accessList.map(a => `
                            <tr>
                                <td><strong>${esc(a.serverName)}</strong></td>
                                <td class="text-muted text-sm">${formatDate(a.assignedAt)}</td>
                                <td><button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="revokeAccess('${a.serverId}','${esc(a.serverName)}')">Remove</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderServerDropdown(currentAccess) {
            const assignedIds = new Set(currentAccess.map(a => a.serverId));
            const available = allServers.filter(s => !assignedIds.has(s.id));
            const sel = document.getElementById('serverSelect');
            if (!available.length) {
                sel.innerHTML = '<option value="">All servers assigned</option>';
                return;
            }
            sel.innerHTML = '<option value="">Select a server...</option>' +
                available.map(s => `<option value="${s.id}">${esc(s.name)} (${esc(s.environment)})</option>`).join('');
        }

        async function addServerAccess() {
            const userId = document.getElementById('accessUserId').value;
            const serverId = document.getElementById('serverSelect').value;
            if (!serverId) { showError('Select a server', 'accessAlert'); return; }

            const res = await apiFetch(`/users/${userId}/server-access`, {
                method: 'POST',
                body: JSON.stringify({ serverIds: [serverId] })
            });

            if (!res.ok) {
                const err = await res.json();
                showError(err.message || 'Failed to assign server', 'accessAlert');
                return;
            }

            showSuccess('Server access granted', 'accessAlert');
            // Reload the access list
            const accessRes = await apiFetch(`/users/${userId}/server-access`);
            if (accessRes.ok) {
                const access = await accessRes.json();
                renderCurrentAccess(access);
                renderServerDropdown(access);
            }
        }

        async function revokeAccess(serverId, serverName) {
            if (!confirm(`Remove access to "${serverName}"?`)) return;
            const userId = document.getElementById('accessUserId').value;
            const res = await apiFetch(`/users/${userId}/server-access/${serverId}`, { method: 'DELETE' });
            if (!res.ok && res.status !== 204) { showError('Failed to revoke access', 'accessAlert'); return; }

            showSuccess('Access revoked', 'accessAlert');
            const accessRes = await apiFetch(`/users/${userId}/server-access`);
            if (accessRes.ok) {
                const access = await accessRes.json();
                renderCurrentAccess(access);
                renderServerDropdown(access);
            }
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        loadUsers();
    </script>
</body>
</html>
